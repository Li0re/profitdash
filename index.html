                  transition:'background .1s',
                }}
                onMouseEnter={e=>{if(!sel)e.currentTarget.style.background='rgba(255,255,255,.08)';}}
                onMouseLeave={e=>{if(!sel)e.currentTarget.style.background=tod?'rgba(16,185,129,.15)':'transparent';}}
                >{d}</button>
              );
            })}
          </div>

          {/* Footer */}
          <div style={{display:'flex',justifyContent:'space-between',marginTop:12,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.06)'}}>
            <button type="button" onClick={()=>{onChange('');setOpen(false);}} style={{...btnBase,padding:'5px 12px',border:'1px solid rgba(255,255,255,.08)',borderRadius:7,color:'#71717a',fontSize:11,background:'rgba(255,255,255,.03)'}}>Effacer</button>
            <button type="button" onClick={goToday} style={{...btnBase,padding:'5px 12px',border:'1px solid rgba(16,185,129,.35)',borderRadius:7,color:'var(--em)',fontSize:11,fontWeight:600,background:'rgba(16,185,129,.1)'}}>Aujourd'hui</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Dashboard({user}) {
  const [cfg, setCfg] = useState(DEFAULT_CFG);
  const calc = useMemo(()=>mkCalc(cfg),[cfg]);
  const [rawEntries, setRawEntries] = useState([]);
  const rows = useMemo(()=>rawEntries.map(r=>calc(r)),[rawEntries,calc]);
  const [form, setForm] = useState({date:toDay(),product:'',ca:'',pub:'',cogs:'',clics:'',cpc:'',ventes:'',notes:''});
  const [period, setPeriod] = useState('7d');
  const [cs, setCs] = useState(dBack(30));
  const [ce, setCe] = useState(toDay());
  const [toast, setToast] = useState(null);
  const [editId, setEditId] = useState(null);
  const [sortKey, setSortKey] = useState('date');
  const [sortDir, setSortDir] = useState('desc');
  const [search, setSearch] = useState('');
  const [hmTip, setHmTip] = useState(null);
  const [searchDeb, setSearchDeb] = useState('');
  const [roasFlt, setRoasFlt] = useState('');
  const fileRef = React.useRef(null);
  useEffect(()=>{ const t=setTimeout(()=>setSearchDeb(search),180); return ()=>clearTimeout(t); },[search]);

  // ── Firebase: load settings + subscribe entries ──
  useEffect(()=>{
    if(!user) return;
    // Settings
    settingsDoc(user.uid).get().then(doc=>{
      if(doc.exists) setCfg(c=>({...c,...doc.data()}));
      else {
        // migrate from localStorage si premier login
        const leg = legacyCfg();
        settingsDoc(user.uid).set(leg);
        setCfg(leg);
      }
    });
    // Draft
    try{ const d=JSON.parse(localStorage.getItem(SK3)||'null'); if(d) setForm(f=>({...f,...d})); }catch{}
    // Entries realtime
    const unsub = entriesCol(user.uid).onSnapshot(
      snap=>{ setRawEntries(snap.docs.map(d=>({...d.data(),id:d.id}))); },
      err=>{ console.error('Firestore read error:',err); setToast({msg:'Erreur Firestore: '+err.code,ok:false}); }
    );
    // Migration localStorage → Firebase (silencieuse, une seule fois)
    const leg = legacyEntries();
    if(leg.length>0 && !localStorage.getItem('profitdash_migrated')){
      localStorage.setItem('profitdash_migrated','1'); // set immédiatement, pas de retry
      const batch = fbDb.batch();
      leg.forEach(e=>{ const ref=entriesCol(user.uid).doc(String(e.id)); batch.set(ref,e); });
      batch.commit()
        .then(()=>{ localStorage.removeItem('profitdash_v1'); })
        .catch(err=>console.warn('Migration échouée:',err));
    }
    return unsub;
  },[user]);

  const sf = (k,v)=>setForm(f=>({...f,[k]:v}));

  /* filter & dates */
  const periodBounds = useMemo(()=>{
    let s,e;
    if(period==='7d'){s=dBack(6);e=FAR;}
    else if(period==='30d'){s=dBack(29);e=FAR;}
    else if(period==='90d'){s=dBack(89);e=FAR;}
    else if(period==='180d'){s=dBack(179);e=FAR;}
    else if(period==='365d'){s=dBack(364);e=FAR;}
    else if(period==='month'){s=mStart();e=mEnd();}
    else{s=cs;e=ce;}
    return {s,e};
  }, [period, cs, ce]);

  const filtered = useMemo(()=>{
    const {s,e} = periodBounds;
    return rows.filter(x=>x.date>=s&&x.date<=e).sort((a,b)=>a.date.localeCompare(b.date));
  },[rows,periodBounds]);

  /* kpis — single pass */
  const kpis = useMemo(()=>{
    let ca=0,pb=0,cogs=0,tx=0,rawPr=0,grossP=0;
    for(const e of filtered){ ca+=e.ca; pb+=e.pub; cogs+=e.cogs; tx+=e.taxAmt; rawPr+=e.profit; grossP+=e.grossProfit; }
    const cogs_=cogs, tx_=tx; // keep for compat
    
    // Prorata Frais Fixes (cap e à today pour éviter 27 000 jours avec FAR)
    const {s,e} = periodBounds;
    let daysInPeriod = 0;
    if (s && e) {
      const eC = e > toDay() ? toDay() : e;
      daysInPeriod = Math.max(1, Math.round((new Date(eC+'T12:00:00Z') - new Date(s+'T12:00:00Z'))/86400000) + 1);
    }
    const fixedCostsProrata = filtered.length > 0 ? (cfg.fixedCosts || 0) * (daysInPeriod / 30) : 0;
    const finalProfit = rawPr - fixedCostsProrata;

    return {ca, pb, cogs, tx, rawPr, pr:finalProfit, roas:pb>0?ca/pb:0, fixedCostsProrata, grossProfit:grossP};
  },[filtered, periodBounds, cfg.fixedCosts]);

  /* previous period kpis */
  const prevKpis = useMemo(()=>{
    let ps,pe;
    if(period==='7d'){pe=dBack(7);ps=dBack(13);}
    else if(period==='30d'){pe=dBack(30);ps=dBack(59);}
    else if(period==='90d'){pe=dBack(90);ps=dBack(179);}
    else if(period==='180d'){pe=dBack(180);ps=dBack(359);}
    else if(period==='365d'){pe=dBack(365);ps=dBack(729);}
    else if(period==='month'){
      const n=new Date();
      const pm=new Date(n.getFullYear(),n.getMonth()-1,1);
      const pme=new Date(n.getFullYear(),n.getMonth(),0);
      ps=pm.toISOString().slice(0,10);pe=pme.toISOString().slice(0,10);
    } else if(cs&&ce){
      const msPerDay=86400000;
      const csDt=new Date(cs+'T00:00:00'),ceDt=new Date(ce+'T00:00:00');
      const len=Math.round((ceDt-csDt)/msPerDay)+1;
      const pEnd=new Date(csDt-msPerDay);
      const pStart=new Date(pEnd-(len-1)*msPerDay);
      pe=pEnd.toISOString().slice(0,10);ps=pStart.toISOString().slice(0,10);
    } else return {ca:0,pr:0,roas:0};
    const prev=rows.filter(x=>x.date>=ps&&x.date<=pe);
    const ca=prev.reduce((s,e)=>s+e.ca,0);
    const pb=prev.reduce((s,e)=>s+e.pub,0);
    const rawPr=prev.reduce((s,e)=>s+e.profit,0);

    let daysInPeriod = 0;
    if (ps && pe) {
      daysInPeriod = Math.max(1, Math.round((new Date(pe+'T12:00:00Z') - new Date(ps+'T12:00:00Z'))/86400000) + 1);
    }
    const fixedCostsProrata = prev.length > 0 ? (cfg.fixedCosts || 0) * (daysInPeriod / 30) : 0;
    const pr = rawPr - fixedCostsProrata;

    return {ca,pr,roas:pb>0?ca/pb:0};
  },[rows,period,cs,ce]);

  const pctChg = (cur,prv) => (prv&&prv!==0) ? (cur-prv)/Math.abs(prv)*100 : null;
  const DeltaBadge = ({cur,prv,invert=false}) => {
    const p=pctChg(cur,prv); if(p===null) return null;
    const pos=invert?(p<=0):(p>=0);
    return (
      <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:20,marginLeft:4,
        background:pos?'var(--em2)':'var(--rd2)',color:pos?'var(--em)':'var(--rd)'}}>
        {p>=0?'↑':'↓'}{Math.abs(p).toFixed(1)}%
      </span>
    );
  };

  /* preview */
  const prev = useMemo(()=>{
    const ca=+form.ca||0,pub=+form.pub||0,cogs=+form.cogs||0;
    const feesAmt=ca*((cfg.fees||0)/100);
    const otherVarAmt=ca*((cfg.otherFees||0)/100);
    const taxAmt=ca*((cfg.taxes||0)/100);
    const grossProfit=ca-pub-cogs-feesAmt-otherVarAmt;
    const profit=grossProfit-taxAmt;
    const roas=pub>0?ca/pub:0;
    return {ca,feesAmt,otherVarAmt,taxAmt,grossProfit,profit,roas};
  },[form,cfg]);

  const [saveState, setSaveState] = useState('idle');

  // ── Firestore write helpers ──
  const rawOf = ({id,date,product,ca,pub,cogs,clics,cpc,ventes,notes})=>({id:String(id),date,product:product||'',ca:+ca||0,pub:+pub||0,cogs:+cogs||0,clics:+clics||0,cpc:+cpc||0,ventes:+ventes||0,notes:notes||''});
  const fsSet = entry => entriesCol(user.uid).doc(String(entry.id)).set(rawOf(entry))
    .catch(err=>{ setToast({msg:'Erreur sauvegarde: '+err.code,ok:false}); console.error('fsSet',err); });
  const fsDel = id => entriesCol(user.uid).doc(String(id)).delete()
    .catch(err=>{ setToast({msg:'Erreur suppression: '+err.code,ok:false}); console.error('fsDel',err); });

  const save = ()=>{
    if(!form.date||!form.ca){setToast({msg:'Date et CA requis.',ok:false});return;}
    let cpcFinal = form.cpc;
    if((!cpcFinal||+cpcFinal===0)&&+form.clics>0&&+form.pub>0){
      cpcFinal=(+form.pub/+form.clics).toFixed(3);
    }
    const payload={...form,cpc:cpcFinal};
    if(editId!==null){
      const entry={...rawEntries.find(r=>r.id===String(editId)||r.id===editId),...payload,id:String(editId)};
      fsSet(entry);
      setToast({msg:'Modifié !',ok:true});
    } else {
      const id=String(Date.now());
      fsSet({...payload,id});
      setToast({msg:'Enregistré !',ok:true});
    }
    setForm({date:toDay(),product:'',ca:'',pub:'',cogs:'',clics:'',cpc:'',ventes:'',notes:''});
    setEditId(null);
    localStorage.removeItem(SK3);
    setSaveState('success');
    setTimeout(()=>setSaveState('idle'),1500);
  };
  const startEdit = r => {
    setEditId(r.id);
    setForm({date:r.date,product:r.product||'',ca:String(r.ca||''),pub:String(r.pub||''),cogs:String(r.cogs||''),clics:String(r.clics||''),cpc:String(r.cpc||''),ventes:String(r.ventes||''),notes:r.notes||''});
    window.scrollTo({top:0,behavior:'smooth'});
  };
  const cancelEdit = ()=>{ setEditId(null); setForm({date:toDay(),product:'',ca:'',pub:'',cogs:'',clics:'',cpc:'',ventes:'',notes:''}); };
  const del = id=>{
    const deleted = rows.find(r=>r.id===id||r.id===String(id));
    fsDel(id);
    setToast({
      msg:'Supprimé.', ok:true,
      actionLabel:'Annuler',
      onAction:()=>{ if(deleted) fsSet(rawOf(deleted)); }
    });
  };
  // Autosave draft form (si form a du contenu non vide)
  useEffect(()=>{
    const isDirty = form.product || form.ca || form.pub || form.cogs || form.clics || form.cpc || form.ventes || form.notes;
    if(editId!==null) return;
    if(isDirty) localStorage.setItem(SK3, JSON.stringify(form));
    else localStorage.removeItem(SK3);
  },[form, editId]);


  useEffect(()=>{
    if(!form.product && !form.ca && !form.pub && !form.cogs && !form.clics && !form.cpc && !form.ventes && !form.notes){
      localStorage.removeItem(SK3);
    }
  },[form]);

  // Theme toggle
  const [theme, setTheme] = useState(()=>localStorage.getItem('profitdash_theme')||'dark');
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('profitdash_theme', theme);
  },[theme]);

  // Cmd+Enter save · / focus search · N focus CA · Esc cancel
  useEffect(()=>{
    const h = e => {
      const tag = (e.target.tagName||'').toLowerCase();
      const typing = tag==='input' || tag==='textarea' || tag==='select';
      if((e.metaKey||e.ctrlKey) && e.key==='Enter'){ e.preventDefault(); save(); return; }
      if(e.key==='Escape' && editId!==null){ cancelEdit(); return; }
      if(typing) return;
      if(e.key==='/'){ e.preventDefault(); document.querySelector('.search-inp')?.focus(); }
      if(e.key.toLowerCase()==='n'){ e.preventDefault(); document.getElementById('f-ca')?.focus(); }
    };
    window.addEventListener('keydown', h);
    return ()=>window.removeEventListener('keydown', h);
  },[form,editId,rows]);

  /* Export CSV */
  const doExportCSV = () => {
    if(!rows.length){ setToast({msg:'Aucune donnée à exporter.',ok:false}); return; }
    const clean = rows.map(({id,date,product,ca,pub,cogs,clics,cpc})=>({id,date,product,ca,pub,cogs,clics,cpc}));
    download(`profitdash_${toDay()}.csv`, toCSV(clean), 'text/csv;charset=utf-8');
    setToast({msg:`${rows.length} lignes exportées (CSV)`,ok:true});
  };
  /* Export JSON backup */
  const doExportJSON = () => {
    const bak = { version:1, date:new Date().toISOString(), entries:rawEntries, settings:cfg };
    download(`profitdash_backup_${toDay()}.json`, JSON.stringify(bak,null,2), 'application/json');
    setToast({msg:'Backup JSON téléchargé',ok:true});
  };
  /* Import JSON/CSV → Firestore */
  const doImport = e => {
    const f = e.target.files?.[0]; if(!f) return;
    const rd = new FileReader();
    rd.onload = async () => {
      try{
        const text = rd.result;
        let entries = [];
        if(f.name.endsWith('.json')){
          const j = JSON.parse(text);
          entries = Array.isArray(j) ? j : (j.entries||[]);
          if(j.settings && confirm('Restaurer aussi les paramètres ?')){
            settingsDoc(user.uid).set({...DEFAULT_CFG,...j.settings});
          }
        } else {
          entries = parseCSV(text).map(r=>({
            id: String(Date.now()+Math.round(Math.random()*9999)),
            date: r.date, product: r.product||'',
            ca:+r.ca||0, pub:+r.pub||0, cogs:+r.cogs||0,
            clics:+r.clics||0, cpc:+r.cpc||0, ventes:0, notes:'',
          })).filter(r=>r.date);
        }
        if(!entries.length){ setToast({msg:'Aucune entrée valide.',ok:false}); return; }
        // Merge with existing (by id)
        const existingIds = new Set(rawEntries.map(r=>String(r.id)));
        const toWrite = entries.map(r=>({...r, id:String(r.id||Date.now()+Math.round(Math.random()*9999))}));
        const batch = fbDb.batch();
        toWrite.forEach(r=>{ batch.set(entriesCol(user.uid).doc(r.id), r); });
        await batch.commit();
        setToast({msg:`${toWrite.length} entrée(s) importées dans Firebase.`,ok:true});
      }catch(err){ setToast({msg:'Erreur: '+err.message,ok:false}); }
    };
    rd.readAsText(f);
    e.target.value = '';
  };



  const records = useMemo(()=>{
    if(!filtered.length) return null;
    const pick = (fn, cmp='max') => filtered.reduce((best,r)=>{
      const v=fn(r); if(best===null) return {v,d:r.date};
      if(cmp==='max'?v>best.v:v<best.v) return {v,d:r.date};
      return best;
    }, null);
    const hasPub = filtered.filter(r=>r.pub>0);
    const bestRoas = hasPub.length
      ? hasPub.reduce((b,r)=>r.roas>b.v?{v:r.roas,d:r.date}:b,{v:-Infinity,d:''})
      : null;
    return {
      ca: pick(r=>r.ca),
      profit: pick(r=>r.profit),
      worst: pick(r=>r.profit,'min'),
      pub: pick(r=>r.pub),
      clics: pick(r=>+r.clics||0),
      roas: bestRoas && bestRoas.v>0 ? bestRoas : null,
    };
  },[filtered]);

  const dayCount = useMemo(()=>{
    const {s,e} = periodBounds;
    if(!s||!e) return 0;
    const eC = e > toDay() ? toDay() : e;
    return Math.max(1, Math.round((new Date(eC+'T12:00:00Z')-new Date(s+'T12:00:00Z'))/86400000)+1);
  },[periodBounds]);
  const activeDays = filtered.length;

  // Top produits
  const topProducts = useMemo(()=>{
    const map = {};
    filtered.forEach(r=>{
      const k = (r.product||'Sans nom').trim() || 'Sans nom';
      if(!map[k]) map[k] = {name:k, ca:0, pub:0, profit:0, count:0};
      map[k].ca += r.ca; map[k].pub += r.pub; map[k].profit += r.profit; map[k].count++;
    });
    return Object.values(map).sort((a,b)=>b.ca-a.ca).slice(0,5).map(p=>({...p, roas:p.pub>0?p.ca/p.pub:0}));
  },[filtered]);

  // Objectif mensuel CA — dailyTarget × jours période
  const targetCA = (cfg.dailyTarget||0) * dayCount;
  const goalPct = targetCA>0 ? Math.min(100, (kpis.ca/targetCA)*100) : 0;
  // Objectif profit mensuel — prorata période
  const targetProfit = (cfg.monthlyProfitTarget||0) * (dayCount/30);
  const profitGoalPct = targetProfit>0 ? Math.min(100, (kpis.pr/targetProfit)*100) : 0;

  // Break-even pub (pub max avant profit=0)
  const breakEven = useMemo(()=>{
    if(!filtered.length) return null;
    const totalCogs = filtered.reduce((s,r)=>s+r.cogs,0);
    const bePub = kpis.ca*(1-(cfg.fees||0)/100-(cfg.otherFees||0)/100-(cfg.taxes||0)/100) - totalCogs;
    const margin = bePub>0 ? ((bePub-kpis.pb)/bePub)*100 : 0;
    const safe = bePub-kpis.pb; // marge de sécurité
    return {bePub: Math.max(0,bePub), safe, margin, pct: bePub>0 ? Math.min(100,(kpis.pb/bePub)*100) : 100};
  },[filtered, kpis, cfg]);

  const [kpiTip, setKpiTip] = useState(null); // 'ca'|'profit'|'roas'|null

  const todayLbl = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  
  const chartData = useMemo(() => {
    const {s, e} = periodBounds;
    if (!s || !e) return [];
    // Cap e à aujourd'hui pour éviter de générer des milliers de dates futures
    const eC = e > toDay() ? toDay() : e;

    // Génère les dates en minimisant les soucis de décalage horaire
    const sd = new Date(s+'T12:00:00Z');
    const ed = new Date(eC+'T12:00:00Z');
    const msPerDay = 86400000;
    const len = Math.max(1, Math.round((ed - sd) / msPerDay) + 1);
    const all = [];
    for(let i=0; i<len; i++) {
        const d = new Date(sd.getTime() + i*msPerDay);
        all.push(d.toISOString().slice(0,10));
    }
    
    // Agrège multi-entrées même jour
    const byDate = {};
    filtered.forEach(r => {
      if(!byDate[r.date]) byDate[r.date] = {date:r.date, ca:0, profit:0, pub:0, clics:0, cpcWeighted:0, cpcSumPub:0};
      const b = byDate[r.date];
      b.ca += r.ca; b.profit += r.profit; b.pub += r.pub; b.clics += (+r.clics||0);
      b.cpcWeighted += (r.cpc||0) * r.pub; b.cpcSumPub += r.pub;
    });
    Object.values(byDate).forEach(b=>{
      b.roas = b.pub>0 ? +(b.ca/b.pub).toFixed(3) : 0;
      b.cpc = b.cpcSumPub>0 ? +(b.cpcWeighted/b.cpcSumPub).toFixed(3) : 0;
    });
    return all.map(date => {
      const row = byDate[date];
      if (row) return {date: row.date, ca: row.ca, profit: row.profit, roas: row.roas, cpc: row.cpc, pub: row.pub};
      return {date, ca: 0, profit: 0, roas: 0, cpc: 0, pub: 0};
    });
  }, [filtered, periodBounds]);

  // Moving average 7j
  const [showMA, setShowMA] = useState(false);

  // Streak profit positif (jours consécutifs depuis plus récent)
  const streaks = useMemo(()=>{
    if(!filtered.length) return {pos:0, neg:0};
    const sorted = [...filtered].sort((a,b)=>b.date.localeCompare(a.date));
    let pos=0, neg=0;
    for(const r of sorted){ if(r.profit>=0) pos++; else break; }
    for(const r of sorted){ if(r.profit<0) neg++; else break; }
    return {pos, neg};
  },[filtered]);

  // CPC moyen période vs max
  const avgCpc = useMemo(()=>{
    const totalPub = filtered.reduce((s,r)=>s+r.pub,0);
    const totalClics = filtered.reduce((s,r)=>s+(+r.clics||0),0);
    return totalClics>0 ? totalPub/totalClics : 0;
  },[filtered]);

  // Today card stats
  const todayStats = useMemo(()=>{
    const td=toDay(), yd=dBack(1);
    return { t: rows.find(r=>r.date===td)||null, y: rows.find(r=>r.date===yd)||null };
  },[rows]);

  // Projection fin de mois (toutes périodes)
  const projection = useMemo(()=>{
    if(activeDays===0) return null;
    const now = new Date();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    const elapsed = now.getDate();
    const dailyAvgCA = kpis.ca/elapsed;
    const dailyAvgPr = kpis.pr/elapsed;
    return {
      ca: dailyAvgCA * daysInMonth,
      pr: dailyAvgPr * daysInMonth,
      daysInMonth, elapsed,
    };
  },[period, activeDays, kpis, dayCount]);

  // Sparkline data from chartData (last 14 points max)
  const sparkData = useMemo(()=>{
    const slice = chartData.slice(-14);
    return {
      ca: slice.map(d=>d.ca),
      profit: slice.map(d=>d.profit),
      roas: slice.map(d=>d.roas||0),
    };
  },[chartData]);

  // AOV / CPA totals
  const totals = useMemo(()=>{
    const ventes = filtered.reduce((s,r)=>s+(+r.ventes||0),0);
    const aov = ventes>0 ? kpis.ca/ventes : 0;
    const cpa = ventes>0 ? kpis.pb/ventes : 0;
    const convR = (() => {
      const totClics = filtered.reduce((s,r)=>s+(+r.clics||0),0);
      return totClics>0 && ventes>0 ? (ventes/totClics)*100 : 0;
    })();
    return {ventes, aov, cpa, convR};
  },[filtered, kpis]);

  return (
    <div className="shell">
      {/* NAV */}
      <nav className="nav">
        <div className="brand">
          <div><div className="bn shimmer-text">ProfitDash</div><div className="bs">E-Commerce · High-Ticket</div></div>
        </div>
        <div className="nav-r">
          <a href="index.html" className="nlink act"><IcGrid/> Dashboard</a>
          <a href="glossaire.html" className="nlink">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
            Glossaire
          </a>
          <a href="settings.html" className="nlink"><IcCog/> Paramètres</a>
          <button className="theme-tog" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} title="Basculer thème">
            {theme==='dark' ? '☀' : '☾'}
          </button>
          <span className="chip">{rows.length} entrée{rows.length!==1?'s':''}</span>
          <span className="chip g">{todayLbl}</span>
          {user.photoURL && <img src={user.photoURL} style={{width:28,height:28,borderRadius:'50%',border:'2px solid var(--em)',cursor:'pointer'}} title={user.displayName||user.email} onClick={()=>{ if(confirm('Se déconnecter ?')) fbAuth.signOut(); }}/>}
          {!user.photoURL && <button className="nlink" onClick={()=>{ if(confirm('Se déconnecter ?')) fbAuth.signOut(); }} style={{fontSize:11}}>Déco</button>}
        </div>
      </nav>

      <div className="main">
        <div className="layout">
          {/* SIDEBAR */}
          <div style={{display:'flex',flexDirection:'column',gap:14,position:'sticky',top:76,alignSelf:'start'}}>
            <div className="fu" style={{marginBottom:2}}>
              <h1 className="pht" style={{fontSize:22}}>Suivi de Rentabilité</h1>
              <p className="phs">Frais {cfg.fees}% · Profit = CA − Pub − COGS − Frais</p>
            </div>

            {/* Period card */}
            <div className="card fu fu1">
              <div className="clbl">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Période
              </div>
              <div className="pgrid">
                {[
                  {k:'7d', l:'7 jours'},
                  {k:'30d', l:'30 jours'},
                  {k:'90d', l:'90 jours'},
                  {k:'month', l:'Mois en cours'},
                  {k:'custom', l:'Personnalisé …', full:true},
                ].map(p=>(
                  <button key={p.k} id={`pb-${p.k}`}
                    className={`pbtn${p.full?' pgrid-full':''}${period===p.k?' act':''}`}
                    onClick={()=>setPeriod(p.k)}>{p.l}</button>
                ))}
              </div>
              {period==='custom' && (
                <>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginTop:8}}>
                    {[{l:'180 jours',d:179},{l:'365 jours',d:364}].map(({l,d})=>{
                      const isAct = cs===dBack(d) && ce===toDay();
                      return (
                      <button key={d} className={`pbtn${isAct?' act':''}`} onClick={()=>{ setCs(dBack(d)); setCe(toDay()); }}>
                        {l}
                      </button>
                    );})}
                  </div>
                  <DateRangePicker
                    start={cs} end={ce}
                    onApply={(s,e)=>{ setCs(s); setCe(e); }}
                  />
                </>
              )}
              {period!=='custom' && (
                <div style={{fontSize:11,color:'var(--tx3)',marginTop:8,textAlign:'center'}}>
                  {filtered.length} entrée{filtered.length!==1?'s':''} · {period==='7d'?'7 derniers jours':period==='30d'?'30 derniers jours':period==='90d'?'90 derniers jours':period==='180d'?'180 derniers jours':'Mois en cours'}
                </div>
              )}
            </div>

            {/* Form card */}
            <div className="card fu fu2">
              <div className="clbl">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--em)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="15" x2="12" y2="19"/><line x1="10" y1="17" x2="14" y2="17"/></svg>
                Saisie Quotidienne
              </div>
              {editId===null && rows.length>0 && (
                <button className="btn-dupe" onClick={()=>{
                  const last = [...rows].sort((a,b)=>b.date.localeCompare(a.date))[0];
                  setForm({date:toDay(), product:last.product||'', ca:String(last.ca||''), pub:String(last.pub||''), cogs:String(last.cogs||''), clics:String(last.clics||''), cpc:String(last.cpc||''), ventes:String(last.ventes||''), notes:''});
                  setToast({msg:`Valeurs du ${dfmt(last.date)} copiées`,ok:true});
                }}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                  Dupliquer dernier jour
                </button>
              )}
              <div className="fg">
                <div className="fld full"><label>Date / Produit</label>
                  <div style={{display:'flex',gap:10}}>
                    <DatePicker value={form.date} onChange={v=>sf('date',v)}/>
                    <input id="f-product" type="text" placeholder="Nom du produit" value={form.product} onChange={e=>sf('product',e.target.value)} style={{flex:2}}/>
                  </div>
                </div>
                <div className="fld"><label><em>€</em> CA Stripe/PayPal</label>
                  <div className="sfx"><input id="f-ca" type="number" min="0" step="0.01" placeholder="0.00" value={form.ca} onChange={e=>sf('ca',e.target.value)}/><span className="sfx-t">€</span></div></div>
                <div className="fld"><label>Dépenses Pub</label>
                  <div className="sfx"><input id="f-pub" type="number" min="0" step="0.01" placeholder="0.00" value={form.pub} onChange={e=>sf('pub',e.target.value)}/><span className="sfx-t">€</span></div></div>
                <div className="fld"><label>COGS Fournisseur</label>
                  <div className="sfx"><input id="f-cogs" type="number" min="0" step="0.01" placeholder="0.00" value={form.cogs} onChange={e=>sf('cogs',e.target.value)}/><span className="sfx-t">€</span></div></div>
                <div className="fld"><label>Nb de Clics</label>
                  <input id="f-clics" type="number" min="0" placeholder="0" value={form.clics} onChange={e=>sf('clics',e.target.value)}/></div>
                <div className="fld"><label>CPC Moyen</label>
                  <div className="sfx"><input id="f-cpc" type="number" min="0" step="0.001" placeholder="0.000" value={form.cpc} onChange={e=>sf('cpc',e.target.value)}/><span className="sfx-t">€</span></div></div>
                <div className="fld"><label>Nb Ventes</label>
                  <input id="f-ventes" type="number" min="0" placeholder="0" value={form.ventes} onChange={e=>sf('ventes',e.target.value)}/></div>
                <div className="fld full"><label>Notes (optionnel)</label>
                  <textarea className="notes-area" placeholder="Observations du jour…" value={form.notes} onChange={e=>sf('notes',e.target.value)}/></div>
              </div>
              {prev.ca>0&&(
                <div className="prev">
                  <div className="prev-t">Aperçu instantané</div>
                  <div className="prev-g">
                    <div className="prev-c">
                      <div className="prev-cl">Bénéfice Net</div>
                      <div className="prev-cv" style={{color:prev.profit>=0?'var(--em)':'var(--rd)'}}>{fmtEUR(prev.profit)}</div>
                    </div>
                    <div className="prev-c">
                      <div className="prev-cl">ROAS estimé</div>
                      <div className="prev-cv" style={{color:prev.roas>=cfg.roasGood?'var(--em)':prev.roas>=cfg.roasMin?'var(--or)':'var(--rd)'}}>{fmtN(prev.roas,2)}×</div>
                    </div>
                    <div className="prev-c" style={{gridColumn:'1/-1'}}>
                      <div className="prev-cl">Marge Brute ~{fmtN(prev.ca>0?prev.grossProfit/prev.ca*100:0,1)}%</div>
                      <div className="prev-cv" style={{fontSize:14,color:'var(--tx3)'}}>{fmtEUR(prev.grossProfit)}  (hors impôts)</div>
                    </div>
                  </div>
                </div>
              )}
              <button id="btn-save" className={`btn-save ${saveState==='success'?'success':''}`} onClick={save}>
                {saveState==='success' ? <><IcCheck c="#fff"/> Succès !</> : editId!==null ? <><IcSave c="#fff"/> Modifier la journée</> : <><IcSave c="#fff"/> Enregistrer la journée</>}
              </button>
              {editId!==null && (
                <button onClick={cancelEdit} style={{width:'100%',marginTop:8,padding:9,background:'var(--sf2)',border:'1px solid var(--bd2)',borderRadius:10,color:'var(--tx2)',fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Annuler l'édition</button>
              )}
              <div style={{fontSize:10,color:'var(--tx3)',textAlign:'center',marginTop:8}}>⌘/Ctrl+Entrée pour enregistrer</div>
            </div>
          </div>

          {/* DASHBOARD */}
          <div>

            {/* Export/Import bar */}
            <div className="fu fu1" style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span className="xlabel">Données</span>
                <button className="xbtn" onClick={doExportCSV} title="Export CSV">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  CSV
                </button>
                <button className="xbtn" onClick={doExportJSON} title="Backup JSON complet">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Backup JSON
                </button>
                <button className="xbtn" onClick={()=>fileRef.current?.click()} title="Importer CSV ou JSON">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  Importer
                </button>
                <input ref={fileRef} type="file" accept=".json,.csv" style={{display:'none'}} onChange={doImport}/>
                <span style={{marginLeft:'auto',fontSize:10,color:'var(--tx3)'}}>
                  <span className="kbd">/</span> filtrer · <span className="kbd">N</span> saisie · <span className="kbd">⌘↵</span> save · <span className="kbd">Esc</span> annuler
                </span>
              </div>
            </div>

            {/* Alerts */}
            {(streaks.neg>=3 || streaks.pos>=5 || (avgCpc>0 && cfg.cpcMax>0 && avgCpc>cfg.cpcMax) || (kpis.roas>0 && kpis.roas<cfg.roasMin) || (totals.cpa>0 && totals.aov>0 && totals.cpa>totals.aov)) && (
              <div className="alerts fu fu1">
                {streaks.pos>=5 && <div className="alert good">🔥 Streak positif : {streaks.pos} jours</div>}
                {streaks.neg>=3 && <div className="alert bad">⚠ {streaks.neg} jours profit négatif d'affilée</div>}
                {avgCpc>0 && cfg.cpcMax>0 && avgCpc>cfg.cpcMax && <div className="alert warn">CPC moyen {fmtN(avgCpc,2)}€ &gt; max {fmtN(cfg.cpcMax,2)}€</div>}
                {kpis.roas>0 && kpis.roas<cfg.roasMin && <div className="alert warn">ROAS {fmtN(kpis.roas,2)}× &lt; seuil {cfg.roasMin}×</div>}
                {totals.cpa>0 && totals.aov>0 && totals.cpa>totals.aov && <div className="alert bad">🚨 CPA {fmtEUR(totals.cpa)} &gt; AOV {fmtEUR(totals.aov)} — chaque vente perd de l'argent en pub</div>}
              </div>
            )}

            {/* Break-even pub */}
            {breakEven && kpis.pb>0 && (
              <div className="goal-card fu fu1" style={{borderColor:breakEven.pct>90?'rgba(244,63,94,.35)':breakEven.pct>70?'rgba(249,115,22,.3)':'rgba(255,255,255,0.08)'}}>
                <div className="goal-head">
                  <div className="goal-title" style={{color:breakEven.pct>90?'var(--rd)':breakEven.pct>70?'var(--or)':'var(--tx3)'}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    Seuil de rentabilité pub
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:breakEven.pct>90?'var(--rd)':breakEven.pct>70?'var(--or)':'var(--em)'}}>{fmtN(breakEven.pct,0)}% utilisé</div>
                </div>
                <div className="be-bar">
                  <div className="be-fill" style={{width:`${breakEven.pct}%`,background:breakEven.pct>90?'var(--rd)':breakEven.pct>70?'var(--or)':'var(--em)'}}/>
                </div>
                <div className="goal-meta">
                  <span>Pub actuelle: {fmtEUR(kpis.pb)}</span>
                  <span>Max avant perte: {fmtEUR(breakEven.bePub)}</span>
                </div>
                {breakEven.safe>0 && <div style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>Marge de sécurité: <span style={{color:breakEven.pct>90?'var(--rd)':'var(--em)',fontWeight:600}}>{fmtEUR(breakEven.safe)}</span></div>}
              </div>
            )}

            {/* Projection fin de mois */}
            {projection && (
              <div className="goal-card fu fu1" style={{borderColor:'rgba(129,140,248,.3)'}}>
                <div className="goal-head">
                  <div className="goal-title" style={{color:'var(--in)'}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--in)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M7 12l4-3 4 2 4-5"/></svg>
                    Projection fin du mois ({projection.elapsed}/{projection.daysInMonth}j)
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginTop:4}}>
                  <div>
                    <div style={{fontSize:10,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}>CA projeté</div>
                    <div style={{fontSize:18,fontWeight:700,color:'var(--in)'}}>{fmtEUR(projection.ca)}</div>
                    <div className="proj-hint">Actuel: {fmtEUR(kpis.ca)}</div>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}>Profit projeté</div>
                    <div style={{fontSize:18,fontWeight:700,color:projection.pr>=0?'var(--em)':'var(--rd)'}}>{fmtEUR(projection.pr)}</div>
                    <div className="proj-hint">Actuel: {fmtEUR(kpis.pr)}</div>
                  </div>
                </div>
              </div>
            )}

            {/* Profit Goal progress */}
            {targetProfit>0 && (
              <div className="goal-card fu fu1" style={{borderColor:kpis.pr>=targetProfit?'rgba(16,185,129,.35)':'var(--bd2)'}}>
                <div className="goal-head">
                  <div className="goal-title">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--em)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 12V22H4a2 2 0 01-2-2V8a2 2 0 012-2h16a2 2 0 012 2v4z"/><path d="M18 12a2 2 0 000 4h4v-4z"/></svg>
                    Objectif Profit ({fmtEUR(cfg.monthlyProfitTarget)}/mois · prorata {dayCount}j)
                  </div>
                  <div className="goal-pct" style={{color:profitGoalPct>=100?'var(--em)':profitGoalPct>=70?'var(--or)':'var(--rd)'}}>{fmtN(profitGoalPct,0)}%</div>
                </div>
                <div className="goal-bar"><div className="goal-fill" style={{width:`${Math.max(0,profitGoalPct)}%`}}/></div>
                <div className="goal-meta">
                  <span>{fmtEUR(kpis.pr)} / {fmtEUR(targetProfit)}</span>
                  <span>{kpis.pr>=targetProfit?'✓ Atteint':`Reste ${fmtEUR(Math.max(0,targetProfit-kpis.pr))}`}</span>
                </div>
              </div>
            )}

            {/* Goal progress */}
            {targetCA>0 && (
              <div className="goal-card fu fu1">
                <div className="goal-head">
                  <div className="goal-title">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--em)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                    Objectif CA période ({fmtEUR(cfg.dailyTarget)}/j × {dayCount}j)
                  </div>
                  <div className="goal-pct" style={{color:goalPct>=100?'var(--em)':goalPct>=70?'var(--or)':'var(--rd)'}}>{fmtN(goalPct,0)}%</div>
                </div>
                <div className="goal-bar"><div className="goal-fill" style={{width:`${goalPct}%`}}/></div>
                <div className="goal-meta">
                  <span>{fmtEUR(kpis.ca)} / {fmtEUR(targetCA)}</span>
                  <span>{kpis.ca>=targetCA?'✓ Atteint':`Reste ${fmtEUR(Math.max(0,targetCA-kpis.ca))}`}</span>
                </div>
              </div>
            )}

            {/* Today card */}
            {todayStats.t && (
              <div className="today-card fu fu2">
                <div className="clbl" style={{marginBottom:10}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--em)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  Aujourd'hui · {dfmt(toDay())}
                  {todayStats.y && <span style={{marginLeft:'auto',fontSize:10,color:'var(--tx3)',fontWeight:400,textTransform:'none',letterSpacing:0}}>vs hier</span>}
                </div>
                <div className="today-grid">
                  <div className="today-stat">
                    <div className="today-lbl">CA</div>
                    <div className="today-val g">{fmtEUR(todayStats.t.ca)}</div>
                    {todayStats.y && <DeltaBadge cur={todayStats.t.ca} prv={todayStats.y.ca}/>}
                  </div>
                  <div className="today-stat">
                    <div className="today-lbl">Profit Net</div>
                    <div className={`today-val ${todayStats.t.profit>=0?'g':'r'}`}>{fmtEUR(todayStats.t.profit)}</div>
                    {todayStats.y && <DeltaBadge cur={todayStats.t.profit} prv={todayStats.y.profit}/>}
                  </div>
                  <div className="today-stat">
                    <div className="today-lbl">ROAS</div>
                    <div className={`today-val ${todayStats.t.roas>=cfg.roasGood?'g':todayStats.t.roas>=cfg.roasMin?'o':'r'}`}>{fmtN(todayStats.t.roas,2)}×</div>
                    {todayStats.y && <DeltaBadge cur={todayStats.t.roas} prv={todayStats.y.roas}/>}
                  </div>
                  <div className="today-stat">
                    <div className="today-lbl">Pub</div>
                    <div className="today-val o">{fmtEUR(todayStats.t.pub)}</div>
                    {todayStats.y && <DeltaBadge cur={todayStats.t.pub} prv={todayStats.y.pub} invert={true}/>}
                  </div>
                </div>
              </div>
            )}

            {/* KPIs */}
            <div className="krow fu fu2">
              <div className="kcard kg" onMouseEnter={()=>setKpiTip('ca')} onMouseLeave={()=>setKpiTip(null)}>
                {kpiTip==='ca' && (
                  <div className="kpi-tip">
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>CA Brut</span><span style={{color:'var(--em)'}}>{fmtEUR(kpis.ca)}</span></div>
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>− Pub</span><span style={{color:'var(--rd)'}}>{fmtEUR(kpis.pb)}</span></div>
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>− COGS</span><span style={{color:'var(--rd)'}}>{fmtEUR(filtered.reduce((s,r)=>s+r.cogs,0))}</span></div>
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>− Frais ({cfg.fees}%+{cfg.otherFees}%)</span><span style={{color:'var(--rd)'}}>{fmtEUR(filtered.reduce((s,r)=>s+r.feesAmt+r.otherVarAmt,0))}</span></div>
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>− URSSAF {cfg.taxes}%</span><span style={{color:'var(--rd)'}}>{fmtEUR(filtered.reduce((s,r)=>s+r.taxAmt,0))}</span></div>
                    <div className="kpi-tip-row"><span>Profit Net</span><span style={{color:kpis.pr>=0?'var(--em)':'var(--rd)'}}>{fmtEUR(kpis.pr)}</span></div>
                  </div>
                )}
                <div className="kico" style={{background:'var(--em2)'}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--em)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                </div>
                <div className="klbl">CA Total</div>
                <div className="kval g"><NumCount value={kpis.ca} isEur={true}/></div>
                <div className="khnt">⌀ {fmtEUR(activeDays?kpis.ca/activeDays:0)}/j · {activeDays} jour{activeDays!==1?'s':''} actifs <DeltaBadge cur={kpis.ca} prv={prevKpis.ca}/></div>
                <Sparkline values={sparkData.ca} color="#10b981"/>
              </div>
              <div className="kcard" style={{borderColor:kpis.pr<0?'rgba(244,63,94,.3)':'var(--bd2)'}} onMouseEnter={()=>setKpiTip('profit')} onMouseLeave={()=>setKpiTip(null)}>
                {kpiTip==='profit' && (
                  <div className="kpi-tip">
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>Bénéfice Brut</span><span style={{color:'var(--em)'}}>{fmtEUR(kpis.grossProfit)}</span></div>
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>− Frais fixes prorata</span><span style={{color:'var(--rd)'}}>{fmtEUR(kpis.fixedCostsProrata)}</span></div>
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>Marge nette</span><span style={{color:kpis.pr>=0?'var(--em)':'var(--rd)'}}>{fmtN(kpis.ca>0?kpis.pr/kpis.ca*100:0,1)}%</span></div>
                    <div className="kpi-tip-row"><span>Profit Net</span><span style={{color:kpis.pr>=0?'var(--em)':'var(--rd)'}}>{fmtEUR(kpis.pr)}</span></div>
                  </div>
                )}
                <div className="kico" style={{background:kpis.pr>=0?'var(--em2)':'var(--rd2)'}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={kpis.pr>=0?'var(--em)':'var(--rd)'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 12V22H4a2 2 0 01-2-2V8a2 2 0 012-2h16a2 2 0 012 2v4z"/><path d="M18 12a2 2 0 000 4h4v-4z"/><path d="M6 6V4a2 2 0 012-2h8a2 2 0 012 2v2"/></svg>
                </div>
                <div className="klbl">Profit Net (Après Impôts)</div>
                <div className={`kval ${kpis.pr>=0?'g':'r'}`}><NumCount value={kpis.pr} isEur={true}/></div>
                <div className="khnt" style={{display:'flex',alignItems:'center',gap:3,fontSize:11}}><IcInfo/> Bénéfice Brut: {fmtEUR(kpis.grossProfit)} <DeltaBadge cur={kpis.pr} prv={prevKpis.pr}/></div>
                <Sparkline values={sparkData.profit} color="#818cf8"/>
              </div>
              <div className="kcard ko" onMouseEnter={()=>setKpiTip('roas')} onMouseLeave={()=>setKpiTip(null)}>
                {kpiTip==='roas' && (
                  <div className="kpi-tip">
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>CA Total</span><span>{fmtEUR(kpis.ca)}</span></div>
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>Pub Total</span><span>{fmtEUR(kpis.pb)}</span></div>
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>Seuil min</span><span style={{color:'var(--em)'}}>{cfg.roasMin}×</span></div>
                    <div className="kpi-tip-row"><span style={{color:'var(--tx3)'}}>Seuil excellent</span><span style={{color:'var(--em)'}}>{cfg.roasGood}×</span></div>
                    <div className="kpi-tip-row"><span>ROAS</span><span style={{color:kpis.roas>=cfg.roasGood?'var(--em)':kpis.roas>=cfg.roasMin?'var(--or)':'var(--rd)'}}>{fmtN(kpis.roas,2)}×</span></div>
                  </div>
                )}
                <div className="kico" style={{background:'var(--or2)'}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--or)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                </div>
                <div className="klbl">ROAS Moyen</div>
                <div className={`kval ${kpis.roas>=cfg.roasGood?'g':kpis.roas>=cfg.roasMin?'o':'r'}`}><NumCount value={kpis.roas} isMult={true}/></div>
                <div className="khnt">{kpis.roas>=cfg.roasGood?'🟢 Excellent':kpis.roas>=cfg.roasMin?'🟡 Bon':kpis.roas>=1?'🟠 Faible':'🔴 Critique'} <DeltaBadge cur={kpis.roas} prv={prevKpis.roas}/></div>
                <Sparkline values={sparkData.roas} color="#f97316"/>
              </div>
            </div>

            {/* Ventes row — only if at least one entry has ventes */}
            {totals.ventes>0 && (
              <div className="krow fu fu2" style={{marginTop:-8}}>
                <div className="kcard" style={{padding:'13px 16px'}}>
                  <div className="klbl">Ventes</div>
                  <div className="kval" style={{fontSize:22}}>{fmtN(totals.ventes,0)}</div>
                  <div className="khnt" style={{fontSize:11}}>Commandes totales</div>
                </div>
                <div className="kcard" style={{padding:'13px 16px'}}>
                  <div className="klbl">AOV (Panier Moyen)</div>
                  <div className="kval" style={{fontSize:22,color:'var(--bl)'}}>{fmtEUR(totals.aov)}</div>
                  <div className="khnt" style={{fontSize:11}}>CA ÷ ventes</div>
                </div>
                <div className="kcard" style={{padding:'13px 16px'}}>
                  <div className="klbl">CPA · Taux Conv.</div>
                  <div className="kval" style={{fontSize:22,color:'var(--or)'}}>{fmtEUR(totals.cpa)}</div>
                  <div className="khnt" style={{fontSize:11}}>Conv: {fmtN(totals.convR,2)}%</div>
                </div>
              </div>
            )}

            {/* Charts */}
            <div className="cstack fu fu3">

                {/* Flux de Cash — pleine largeur */}
                <div className="ccard">
                  <div className="chart-top">
                    <div className="chart-title-block">
                      <div className="ched">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--em)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M7 12l4-3 4 2 4-5"/></svg>
                        Flux de Cash
                      </div>
                      <div className="csub">CA Brut vs Profit Net quotidien</div>
                    </div>
                    <div className="legend">
                      <div className="li">
                        <span style={{width:11,height:11,borderRadius:'50%',background:'#10b981',display:'inline-block',flexShrink:0}}/>
                        CA Brut
                      </div>
                      <div className="li">
                        <span style={{width:11,height:11,borderRadius:'50%',background:'#818cf8',display:'inline-block',flexShrink:0}}/>
                        Profit Net
                      </div>
                      <button className={`chart-tog ${showMA?'act':''}`} onClick={()=>setShowMA(v=>!v)} title="Moyenne mobile 7 jours">MA 7j</button>
                    </div>
                  </div>
                  <AreaChart data={chartData} h={280} showMA={showMA}/>
                </div>

                {/* Performance Pub — pleine largeur */}
                <div className="ccard">
                  <div className="chart-top">
                    <div className="chart-title-block">
                      <div className="ched">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--or)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="20" x2="21" y2="20"/><line x1="7" y1="20" x2="7" y2="12"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="17" y1="20" x2="17" y2="8"/></svg>
                        Performance Pub
                      </div>
                      <div className="csub">ROAS quotidien (barres) · CPC moyen (ligne bleue)</div>
                    </div>
                    <div className="legend">
                      <div className="li">
                        <span style={{width:7,height:16,borderRadius:2,background:'rgba(249,115,22,.85)',display:'inline-block',flexShrink:0}}/>
                        ROAS
                      </div>
                      <div className="li">
                        <span style={{width:22,height:2.5,borderRadius:2,background:'#3b82f6',display:'inline-block',flexShrink:0}}/>
                        CPC
                      </div>
                      <div className="li" style={{color:'var(--tx3)'}}>
                        <span style={{width:22,height:0,borderTop:'2px dashed rgba(16,185,129,.6)',display:'inline-block',flexShrink:0}}/>
                        Obj. {cfg.roasMin}×
                      </div>
                    </div>
                  </div>
                  <BarLineChart data={chartData} roasMin={cfg.roasMin} h={280}/>
                </div>

              </div>

            {/* Records */}
            {records && (
              <div className="rec-wrap fu fu3">
                <div className="clbl">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0V4z"/><path d="M17 4h3v3a3 3 0 01-3 3M7 4H4v3a3 3 0 003 3"/></svg>
                  Records de la période
                </div>
                <div className="rec-grid">
                  <div className="rec-card">
                    <div className="rec-lbl">Meilleur CA</div>
                    <div className="rec-val g">{fmtEUR(records.ca.v)}</div>
                    <div className="rec-date">{dfmt(records.ca.d)}</div>
                  </div>
                  <div className="rec-card">
                    <div className="rec-lbl">Meilleur Profit</div>
                    <div className={`rec-val ${records.profit.v>=0?'g':'r'}`}>{fmtEUR(records.profit.v)}</div>
                    <div className="rec-date">{dfmt(records.profit.d)}</div>
                  </div>
                  {records.roas && (
                    <div className="rec-card">
                      <div className="rec-lbl">Meilleur ROAS</div>
                      <div className="rec-val o">{fmtN(records.roas.v,2)}×</div>
                      <div className="rec-date">{dfmt(records.roas.d)}</div>
                    </div>
                  )}
                  <div className="rec-card">
                    <div className="rec-lbl">Plus grosse pub</div>
                    <div className="rec-val o">{fmtEUR(records.pub.v)}</div>
                    <div className="rec-date">{dfmt(records.pub.d)}</div>
                  </div>
                  <div className="rec-card">
                    <div className="rec-lbl">Max clics</div>
                    <div className="rec-val b">{fmtN(records.clics.v,0)}</div>
                    <div className="rec-date">{dfmt(records.clics.d)}</div>
                  </div>
                  <div className="rec-card">
                    <div className="rec-lbl">Pire jour</div>
                    <div className={`rec-val ${records.worst.v>=0?'g':'r'}`}>{fmtEUR(records.worst.v)}</div>
                    <div className="rec-date">{dfmt(records.worst.d)}</div>
                  </div>
                </div>
              </div>
            )}

            {/* Heatmap calendrier 90j */}
            {rows.length>0 && (()=>{
              const end = new Date();
              const days = 91;
              const start = new Date(end); start.setDate(end.getDate()-(days-1));
              // Align to Monday
              const startDay = (start.getDay()+6)%7;
              start.setDate(start.getDate()-startDay);
              const cells = [];
              const byD = {};
              rows.forEach(r=>{ byD[r.date]=(byD[r.date]||0)+r.ca; });
              let maxCA = 0; Object.values(byD).forEach(v=>{ if(v>maxCA) maxCA=v; });
              const total = Math.ceil((end - start)/86400000)+1;
              for(let i=0;i<total;i++){
                const d = new Date(start); d.setDate(start.getDate()+i);
                const ds = d.toISOString().slice(0,10);
                const v = byD[ds]||0;
                const isFuture = d>end;
                cells.push({ds,v,isFuture,d});
              }
              const color = v=>{
                if(v===0) return 'var(--sf2)';
                const pct = maxCA>0 ? v/maxCA : 0;
                if(pct>0.75) return '#10b981';
                if(pct>0.5) return 'rgba(16,185,129,.75)';
                if(pct>0.25) return 'rgba(16,185,129,.5)';
                return 'rgba(16,185,129,.28)';
              };
              return (
                <div className="hm-wrap fu fu3">
                  <div className="clbl">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Activité 90 derniers jours (CA)
                  </div>
                  <div className="hm-grid">
                    {cells.map(c=>(
                      <div key={c.ds} className="hm-cell"
                        style={{background:c.isFuture?'transparent':color(c.v), opacity:c.isFuture?0.3:1}}
                        onMouseEnter={e=>{ if(!c.isFuture){ const r=e.currentTarget.getBoundingClientRect(); setHmTip({x:r.left+r.width/2, y:r.top, date:c.d, v:c.v}); } }}
                        onMouseLeave={()=>setHmTip(null)}/>
                    ))}
                  </div>
                  <div className="hm-scale">
                    Moins
                    <span className="hm-scale-box" style={{background:'var(--sf2)'}}/>
                    <span className="hm-scale-box" style={{background:'rgba(16,185,129,.28)'}}/>
                    <span className="hm-scale-box" style={{background:'rgba(16,185,129,.5)'}}/>
                    <span className="hm-scale-box" style={{background:'rgba(16,185,129,.75)'}}/>
                    <span className="hm-scale-box" style={{background:'#10b981'}}/>
                    Plus
                  </div>
                </div>
              );
            })()}

            {/* Top Products */}
            {topProducts.length>0 && (
              <div className="tp-wrap fu fu3">
                <div className="clbl">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 7h-9M14 17H5M18 7a3 3 0 11-6 0 3 3 0 016 0zM10 17a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                  Top Produits (par CA)
                </div>
                <div className="tp-row head">
                  <div>Produit</div>
                  <div style={{textAlign:'right'}}>CA</div>
                  <div style={{textAlign:'right'}}>Pub</div>
                  <div style={{textAlign:'right'}}>Profit</div>
                  <div style={{textAlign:'center'}}>ROAS</div>
                  <div></div>
                </div>
                {topProducts.map((p,i)=>{
                  const rc = p.roas>=cfg.roasGood?'rp-g':p.roas>=cfg.roasMin?'rp-o':'rp-r';
                  return (
                    <div key={p.name+i} className="tp-row">
                      <div className="tp-name">{p.name}<span className="tp-cnt">{p.count}j</span></div>
                      <div className="gt" style={{textAlign:'right'}}>{fmtEUR(p.ca)}</div>
                      <div className="ot" style={{textAlign:'right'}}>{fmtEUR(p.pub)}</div>
                      <div style={{textAlign:'right'}} className={p.profit>=0?'gt':'rt'}>{fmtEUR(p.profit)}</div>
                      <div style={{textAlign:'center'}}>{p.pub>0 ? <span className={`roas-pill ${rc}`}>{fmtN(p.roas,2)}×</span> : <span style={{color:'var(--tx3)',fontSize:11}}>—</span>}</div>
                      <div></div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Table */}
            {filtered.length>0&&(
              <div className="card ewrap fu fu3">
                <div className="clbl">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                  Détail des Entrées
                  <div className="tbar">
                    <input className="search-inp" type="text" placeholder="🔍 Filtrer produit…  (/)" value={search} onChange={e=>setSearch(e.target.value)}/>
                    <input className="flt-mini" type="number" step="0.1" min="0" placeholder="ROAS ≥" value={roasFlt} onChange={e=>setRoasFlt(e.target.value)} title="ROAS minimum"/>
                    {(search||roasFlt) && <button className="xbtn" style={{padding:'4px 8px'}} onClick={()=>{setSearch('');setRoasFlt('');}}>×</button>}
                  </div>
                </div>
                <div style={{overflowX:'auto'}}>
                  <table className="dt">
                    <thead>
                      <tr>
                        {[
                          {k:'date',l:'Date',a:'left'},
                          {k:'product',l:'Produit',a:'left'},
                          {k:'ca',l:'CA',a:'right'},
                          {k:null,l:'CA Cumul',a:'right'},
                          {k:'pub',l:'Pub',a:'right'},
                          {k:'cogs',l:'COGS',a:'right'},
                          {k:null,l:'Marges (%)',a:'right'},
                          {k:'profit',l:'Profit Net',a:'right'},
                          {k:'roas',l:'ROAS',a:'center'},
                        ].map((col,i)=>{
                          if(!col.k) return <th key={i} style={{textAlign:col.a}}>{col.l}</th>;
                          const act = sortKey===col.k;
                          return (
                            <th key={i} className="sort-th" style={{textAlign:col.a}}
                              onClick={()=>{
                                if(sortKey===col.k) setSortDir(d=>d==='asc'?'desc':'asc');
                                else { setSortKey(col.k); setSortDir('desc'); }
                              }}>
                              {col.l}<span className={`sort-ar ${act?'act':''}`}>{act?(sortDir==='asc'?'▲':'▼'):'⇅'}</span>
                            </th>
                          );
                        })}
                        <th></th>
                      </tr>
                    </thead>
                    <tbody>
                      {(()=>{
                        // cumul calculé sur chrono
                        let caCumul = 0;
                        const chrono = [...filtered].sort((a,b)=>a.date.localeCompare(b.date));
                        const cumulMap = {};
                        chrono.forEach(e => { caCumul += e.ca; cumulMap[e.id] = caCumul; });
                        // filter produit + ROAS min
                        const q = searchDeb.trim().toLowerCase();
                        const rMin = +roasFlt || 0;
                        let rowsView = filtered.filter(r => (!q || (r.product||'').toLowerCase().includes(q)) && (!rMin || r.roas>=rMin));
                        // sort
                        const sorted = [...rowsView].sort((a,b)=>{
                          const va=a[sortKey], vb=b[sortKey];
                          let cmp;
                          if(typeof va==='string') cmp = va.localeCompare(vb||'');
                          else cmp = (va||0)-(vb||0);
                          return sortDir==='asc'?cmp:-cmp;
                        });
                        return sorted.map((e, index) => {
                          const rc = e.roas>=cfg.roasGood?'rp-g':e.roas>=cfg.roasMin?'rp-o':'rp-r';
                          const isEd = editId===e.id;
                          return (
                            <tr key={e.id} className={`anim-row${isEd?' editing':''}`} style={{animationDelay: `${Math.min(index * 0.02, 0.4)}s`}}>
                              <td className="td-date">{dfmt(e.date)}</td>
                              <td style={{color:'var(--tx)'}}>{e.product||'—'}{e.notes ? <span className="note-badge" title={e.notes}>📝</span> : null}{e.ventes>0 ? <span className="note-badge" title={`${e.ventes} ventes · AOV ${fmtEUR(e.aov)} · CPA ${fmtEUR(e.cpa)}`}>🛒{e.ventes}</span> : null}</td>
                              <td className="gt" style={{textAlign:'right'}}>{fmtEUR(e.ca)}</td>
                              <td style={{textAlign:'right',color:'var(--tx3)'}}>{fmtEUR(cumulMap[e.id]||0)}</td>
                              <td className="rt" style={{textAlign:'right'}}>{fmtEUR(e.pub)}</td>
                              <td className="ot" style={{textAlign:'right'}}>{fmtEUR(e.cogs)}</td>
                              <td style={{textAlign:'right'}}>
                                <div style={{fontSize:11,color:'var(--tx3)'}}>{fmtN(e.grossMarginPct,1)}% (B)</div>
                                <div style={{fontSize:11,color:e.netMarginPct>=0?'var(--em)':'var(--rd)'}}>{fmtN(e.netMarginPct,1)}% (N)</div>
                              </td>
                              <td style={{textAlign:'right'}} className={e.profit>=0?'gt':'rt'}>{fmtEUR(e.profit)}</td>
                              <td style={{textAlign:'center'}}><span className={`roas-pill ${rc}`}>{fmtN(e.roas,2)}×</span></td>
                              <td style={{whiteSpace:'nowrap',textAlign:'right'}}>
                                <button className="bedit" onClick={()=>startEdit(e)} title="Modifier" aria-label={`Modifier l'entrée du ${dfmt(e.date)}`}><I size={12}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></I></button>
                                <button className="bdel" onClick={()=>del(e.id)} title="Supprimer" aria-label={`Supprimer l'entrée du ${dfmt(e.date)}`}><IcTrash/></button>
                              </td>
                            </tr>
                          );
                        });
                      })()}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
      {toast&&<Toast msg={toast.msg} ok={toast.ok} actionLabel={toast.actionLabel} onAction={toast.onAction} onClose={()=>setToast(null)}/>}
      {hmTip && (
        <div className="hm-tip" style={{left:hmTip.x, top:hmTip.y-46, transform:'translateX(-50%)'}}>
          <div className="hm-tip-date">{hmTip.date.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})}</div>
          <div className="hm-tip-val">{hmTip.v>0 ? fmtEUR(hmTip.v) : 'Aucune activité'}</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
