  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09090b;--sf:#18181b;--sf2:#27272a;--sf3:#3f3f46;
      --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.15);
      --tx:#fafafa;--tx2:#a1a1aa;--tx3:#52525b;
      --em:#10b981;--em2:rgba(16,185,129,0.15);--em3:rgba(16,185,129,0.35);
      --rd:#f43f5e;--rd2:rgba(244,63,94,0.14);
      --or:#f97316;--or2:rgba(249,115,22,0.14);
      --bl:#3b82f6;--bl2:rgba(59,130,246,0.14);
      --in:#818cf8;--r:20px;--rl:28px;
    }
    html[data-theme="light"]{
      --bg:#f7f7f8;--sf:#ffffff;--sf2:#f1f1f3;--sf3:#e4e4e7;
      --bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.12);
      --tx:#18181b;--tx2:#52525b;--tx3:#a1a1aa;
      --em2:rgba(16,185,129,0.14);--rd2:rgba(244,63,94,0.12);
      --or2:rgba(249,115,22,0.12);--bl2:rgba(59,130,246,0.12);
    }
    html[data-theme="light"] .nav{background:rgba(255,255,255,0.75);border-bottom:1px solid rgba(0,0,0,0.08)}
    html[data-theme="light"] .toast,html[data-theme="light"] .hm-tip,html[data-theme="light"] .tip-box{background:rgba(255,255,255,.97)!important;color:var(--tx)!important}
    html[data-theme="light"] .pht{background:linear-gradient(120deg,#18181b 30%,#a1a1aa 100%);-webkit-background-clip:text;background-clip:text}
    html{overflow-y:scroll;scrollbar-gutter:stable}
    html,body{min-height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased;width:100%;position:relative}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:10px}
    #root{min-height:100vh}
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes ti{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes drawLine{from{stroke-dashoffset:1}to{stroke-dashoffset:0}}
    @keyframes growBar{from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}
    @keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes pulse-ring{0%{transform:scale(.33);opacity:1}80%,100%{opacity:0}}
    .fu{animation:fu .45s cubic-bezier(.16,1,.3,1) both}
    .fu1{animation-delay:.04s}.fu2{animation-delay:.1s}.fu3{animation-delay:.18s}.fu4{animation-delay:.26s}
    .anim-path{stroke-dasharray:1;stroke-dashoffset:0;animation:drawLine 1.1s cubic-bezier(.16,1,.3,1) both}
    .anim-bar{transform-origin:bottom;animation:growBar .6s cubic-bezier(.16,1,.3,1) both}
    .anim-row{animation:rowIn .35s cubic-bezier(.16,1,.3,1) both}
    .shimmer-text{color:var(--tx);background:linear-gradient(90deg,var(--tx) 0%,#10b981 50%,var(--tx) 100%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite}
    @media (prefers-reduced-motion: reduce){
      .fu,.anim-path,.anim-bar,.anim-row,.shimmer-text{animation:none!important}
      .shimmer-text{-webkit-text-fill-color:var(--tx)}
    }
    .btn-save.success{background:var(--em);transform:scale(1.02);box-shadow:0 0 20px rgba(16,185,129,0.4)}
    .tip-box{transition:left 0.15s cubic-bezier(0.23, 1, 0.32, 1), top 0.15s cubic-bezier(0.23, 1, 0.32, 1)}
    .bg-v{display:none}
    /* NAV */
    .nav{
      position:fixed;top:0;left:0;right:0;z-index:900;height:60px;
      background:rgba(9,9,11,0.65);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex;align-items:center;justify-content:space-between;padding:0 26px;
      box-shadow:0 4px 30px rgba(0,0,0,0.1)
    }
    .brand{display:flex;align-items:center;gap:10px}
    .bi{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--em),var(--in));
      display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .bn{font-size:15px;font-weight:700;letter-spacing:-.3px}
    .bs{font-size:11px;color:var(--tx3)}
    .nav-r{display:flex;align-items:center;gap:7px}
    .chip{padding:4px 11px;border-radius:20px;border:1px solid var(--bd2);background:var(--sf);font-size:11px;color:var(--tx2)}
    .chip.g{border-color:rgba(16,185,129,.4);background:var(--em2);color:var(--em)}
    .nlink{padding:6px 12px;border-radius:8px;border:1px solid var(--bd2);background:var(--sf2);
      color:var(--tx2);font-size:11px;font-weight:500;text-decoration:none;
      display:inline-flex;align-items:center;gap:5px;transition:all .15s;cursor:pointer}
    .nlink:hover{border-color:var(--tx2);color:var(--tx);background:var(--sf3)}
    .nlink.act{background:var(--em2);border-color:var(--em);color:var(--em)}
    /* Legend */
    .legend{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:8px}
    .li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3)}
    /* SHELL */
    .shell{padding-top:60px}
    .main{padding:28px 22px 60px;max-width:1440px;margin:0 auto}
    /* HEADER */
    .pht{font-size:25px;font-weight:800;letter-spacing:-.5px;
      background:linear-gradient(120deg,#fff 30%,#52525b 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .phs{font-size:12px;color:var(--tx3);margin-top:3px}
    /* LAYOUT */
    .layout{display:grid;grid-template-columns:355px 1fr;gap:18px;align-items:start;margin-top:22px}
    .layout > div:first-child{position:sticky;top:70px;align-self:start}
    .layout .card{padding:12px 14px}
    .layout .clbl{margin-bottom:10px}
    .layout .fg{gap:7px}
    .layout .fld input,.layout .fld select{padding:5px 8px;font-size:12px;border-radius:7px}
    .layout .fld label{font-size:10px}
    .layout .btn-save{margin-top:10px;padding:9px;font-size:13px}
    .layout .btn-dupe{padding:6px;font-size:10.5px;margin-bottom:7px}
    .layout .prev{padding:8px;margin-top:8px}
    .layout .prev-g{gap:5px}
    .layout .prev-c{padding:6px 8px}
    .layout .prev-cv{font-size:14px}
    .layout .pbtn{padding:6px 8px;font-size:11px}
    .layout .pgrid{gap:5px}
    .layout > div:first-child{display:flex;flex-direction:column;gap:10px!important}
    @media(max-width:960px){
      .layout{grid-template-columns:1fr}
      .layout > div:first-child{position:relative;top:0;max-width:460px;width:100%;margin:0 auto}
    }
    /* CARD */
    .card{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rl);padding:20px}
    .clbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);
      margin-bottom:16px;display:flex;align-items:center;gap:6px}
    /* FORM */
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .full{grid-column:1/-1}
    .fld{display:flex;flex-direction:column;gap:5px}
    .fld label{font-size:11px;font-weight:500;color:var(--tx3);display:flex;align-items:center;gap:4px}
    .fld label em{color:var(--em);font-style:normal;font-weight:700}
    .fld input,.fld select{background:var(--sf2);border:1px solid var(--bd2);border-radius:9px;
      padding:7px 10px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;
      outline:none;width:100%;max-width:100%;min-width:0;transition:border-color .15s,box-shadow .15s}
    .fld input:focus,.fld select:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--em2)}
    @keyframes dpIn{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .fld input::placeholder{color:var(--tx3)}
    .sfx{position:relative}.sfx input{padding-right:26px}
    .sfx-t{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--tx3);pointer-events:none}
    /* PREVIEW */
    .prev{background:var(--sf2);border-radius:10px;padding:12px;margin-top:12px}
    .prev-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);margin-bottom:9px}
    .prev-g{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .prev-c{padding:10px;background:var(--sf);border-radius:8px}
    .prev-cl{font-size:10px;color:var(--tx3);margin-bottom:2px}
    .prev-cv{font-size:17px;font-weight:700}
    /* BTN */
    .btn-save{width:100%;margin-top:14px;padding:11px;border:none;border-radius:10px;
      background:linear-gradient(135deg,var(--em),#059669);color:#fff;font-size:14px;
      font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:7px;
      transition:opacity .15s,transform .15s,box-shadow .15s}
    .btn-save:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 22px var(--em3)}
    .btn-save:active{transform:translateY(0)}
    /* PERIOD */
    .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
    .pgrid-full{grid-column:1/-1}
    .pbtn{padding:8px 10px;border-radius:9px;border:1px solid var(--bd2);background:var(--sf2);
      color:var(--tx2);font-size:12px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;
      transition:all .15s;text-align:center;width:100%}
    .pbtn:hover{border-color:var(--tx2);color:var(--tx)}
    .pbtn.act{background:var(--em2);border-color:var(--em);color:var(--em)}
    /* CALENDAR */
    .cal-wrap{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
    .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .cal-month-lbl{font-size:13px;font-weight:600;color:var(--tx)}
    .cal-nav{background:none;border:1px solid var(--bd2);border-radius:7px;cursor:pointer;
      color:var(--tx2);padding:3px 9px;font-size:16px;line-height:1;transition:all .12s;font-family:'Inter',sans-serif}
    .cal-nav:hover{background:var(--sf3);color:var(--tx);border-color:var(--tx3)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .cal-dlbl{font-size:9px;font-weight:700;color:var(--tx3);text-align:center;padding:4px 0;
      text-transform:uppercase;letter-spacing:.5px}
    .cal-day{font-size:12px;text-align:center;padding:7px 2px;border-radius:8px;
      cursor:pointer;color:var(--tx2);transition:background .1s,color .1s;user-select:none}
    .cal-day:hover:not(.cal-empty){background:var(--sf3);color:var(--tx)}
    .cal-day.cal-today{color:var(--em);font-weight:700}
    .cal-day.cal-sel{background:var(--em)!important;color:#fff!important;font-weight:700;border-radius:8px}
    .cal-day.cal-range{background:var(--em2);color:var(--em)}
    .cal-day.cal-empty{cursor:default;pointer-events:none}
    .cal-hint{font-size:11px;color:var(--tx3);margin-top:9px;text-align:center;min-height:16px}
    .cal-result{font-size:11px;color:var(--em);font-weight:600;text-align:center;margin-top:5px}
    /* KPI */
    .krow{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
    @media(max-width:700px){.krow{grid-template-columns:1fr 1fr}}
    /* TODAY CARD */
    .today-card{background:linear-gradient(135deg,rgba(16,185,129,.07),rgba(129,140,248,.05));border:1px solid rgba(16,185,129,.22);border-radius:var(--rl);padding:16px 18px;margin-bottom:14px}
    .today-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .today-stat{display:flex;flex-direction:column;gap:3px}
    .today-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3)}
    .today-val{font-size:19px;font-weight:800;letter-spacing:-.4px;line-height:1.1}
    @media(max-width:600px){.today-grid{grid-template-columns:1fr 1fr}}
    /* MOBILE */
    @media(max-width:768px){
      .nav{padding:0 12px}
      .nav-r .nlink:not(.act){display:none}
      .chip{display:none}
      .nav-r{gap:5px}
      .main{padding:10px 10px 80px}
      .layout{grid-template-columns:1fr!important;gap:10px}
      .layout > div:first-child{position:relative!important;top:0!important}
      .krow{grid-template-columns:1fr 1fr!important}
      .kcard{padding:14px 16px}
      .kval{font-size:22px!important}
      .kico{width:30px!important;height:30px!important}
      .cstack{gap:10px}
      .ccard{border-radius:14px}
      .rec-grid{grid-template-columns:1fr 1fr!important}
      .tp-row{grid-template-columns:1fr 1fr 1fr!important}
      .tp-row > div:nth-child(3),.tp-row > div:nth-child(5){display:none}
      .goal-card{padding:14px}
      .kpi-tip{display:none}
      .tbar{flex-wrap:wrap;gap:5px}
      .search-inp{width:100%!important;max-width:100%!important}
      .ph-row{flex-direction:column;gap:6px}
      h1.pht{font-size:18px!important}
      .hm-grid{grid-template-rows:repeat(7,10px)!important}
      .hm-cell{width:10px!important;height:10px!important}
    }
    @media(max-width:480px){
      .krow{grid-template-columns:1fr!important}
      .today-grid{grid-template-columns:1fr 1fr}
      .fg{grid-template-columns:1fr}
      .full{grid-column:1}
      .kcard:hover{transform:none}
    }
    .kcard{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rl);
      padding:20px 22px;position:relative;overflow:hidden;transition:all .3s cubic-bezier(0.16,1,0.3,1)}
    .kcard:hover{transform:translateY(-4px);box-shadow:0 15px 40px rgba(0,0,0,.45);border-color:rgba(255,255,255,0.25)}
    .kcard:hover .kico{transform:scale(1.1) rotate(5deg)}
    .kico{transition:transform .3s ease}
    .kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .kg::before{background:linear-gradient(90deg,var(--em),transparent)}
    .kr::before{background:linear-gradient(90deg,var(--rd),transparent)}
    .ko::before{background:linear-gradient(90deg,var(--or),transparent)}
    .kico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:13px}
    .klbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:4px}
    .kval{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1}
    .kval.g{color:var(--em)}.kval.r{color:var(--rd)}.kval.o{color:var(--or)}
    .khnt{font-size:12px;color:var(--tx3);margin-top:5px}
    /* CHARTS — pleine largeur, empilés */
    .cstack{display:flex;flex-direction:column;gap:16px}
    .ccard{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rl);padding:22px 24px}
    .chart-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px}
    .chart-title-block{display:flex;flex-direction:column;gap:3px}
    .ched{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
    .csub{font-size:12px;color:var(--tx3)}
    /* Legend inline */
    .legend{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:8px 14px;border-radius:10px;background:var(--sf2);border:1px solid var(--bd)}
    .li{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--tx2);white-space:nowrap}
    /* EMPTY */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:12px;text-align:center}
    .empty p{font-size:14px;color:var(--tx3)}
    /* TABLE */
    .ewrap{margin-top:16px}
    table.dt{width:100%;border-collapse:separate;border-spacing:0 0}
    table.dt thead tr{background:var(--sf2)}
    table.dt th{padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;
      letter-spacing:.55px;color:var(--tx3);white-space:nowrap}
    table.dt th:first-child{border-radius:9px 0 0 9px}
    table.dt th:last-child{border-radius:0 9px 9px 0}
    table.dt td{padding:12px 16px;color:var(--tx2);border-bottom:1px solid var(--bd);font-size:13px;white-space:nowrap;transition:background .12s}
    table.dt tr:last-child td{border-bottom:none}
    table.dt tbody tr{transition:background .15s}
    table.dt tbody tr:hover td{background:rgba(255,255,255,0.035)}
    .td-date{color:var(--tx);font-weight:600;font-size:13px}
    .gt{color:var(--em);font-weight:700}.rt{color:var(--rd);font-weight:700}.ot{color:var(--or)}
    .roas-pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;letter-spacing:.2px}
    .rp-g{background:var(--em2);color:var(--em);border:1px solid rgba(16,185,129,.25)}
    .rp-o{background:var(--or2);color:var(--or);border:1px solid rgba(249,115,22,.25)}
    .rp-r{background:var(--rd2);color:var(--rd);border:1px solid rgba(244,63,94,.25)}
    .bdel{background:none;border:none;cursor:pointer;color:var(--sf3);padding:6px;border-radius:7px;
      display:flex;align-items:center;transition:color .15s,background .15s}
    .bdel:hover{color:var(--rd);background:var(--rd2)}
    /* TOAST */
    .toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--sf);
      border-radius:11px;padding:11px 17px;display:flex;align-items:center;gap:8px;
      font-size:13px;font-weight:500;box-shadow:0 4px 26px rgba(0,0,0,.5);
      animation:ti .28s ease both}
    .tok{border:1px solid var(--em)}.terr{border:1px solid var(--rd)}
    /* RECORDS */
    .rec-wrap{margin-top:16px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rl);padding:18px 20px}
    .rec-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
    @media(max-width:1100px){.rec-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:600px){.rec-grid{grid-template-columns:repeat(2,1fr)}}
    .rec-card{background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:11px 12px;display:flex;flex-direction:column;gap:3px;transition:border-color .15s,transform .15s}
    .rec-card:hover{border-color:var(--bd2);transform:translateY(-1px)}
    .rec-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3)}
    .rec-val{font-size:15px;font-weight:700;letter-spacing:-.3px;line-height:1.15}
    .rec-date{font-size:10px;color:var(--tx3);margin-top:1px}

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;

/* ── helpers ── */
// Memoized formatters — évite new Intl.NumberFormat() à chaque appel
const _fmtN0 = new Intl.NumberFormat('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0});
const _fmtN2 = new Intl.NumberFormat('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});
const _fmtEUR = new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
const fmtN   = (n,d=0) => d===2 ? _fmtN2.format(n) : d===0 ? _fmtN0.format(n) : new Intl.NumberFormat('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const fmtEUR = n => _fmtEUR.format(n);
const toDay  = () => new Date().toISOString().slice(0,10);
const dBack  = n => { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); };
const mStart = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; };
const mEnd   = () => { const d=new Date(); return new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10); };
const FAR    = '2099-12-31'; // pas de cap supérieur pour entrées futures
const dfmt   = s => new Date(s+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});

const SK3 = 'profitdash_draft_v1'; // draft reste local
const DEFAULT_CFG = {fees:3,taxes:12.3,otherFees:0.5,fixedCosts:114,roasMin:2,roasGood:3,dailyTarget:500,cpcMax:3,monthlyProfitTarget:0};
// Legacy localStorage migration helper
const legacyEntries = () => { try{ return JSON.parse(localStorage.getItem('profitdash_v1')||'[]'); }catch{ return []; }};
const legacyCfg    = () => { try{ return {...DEFAULT_CFG,...JSON.parse(localStorage.getItem('profitdash_settings_v1')||'{}')}; }catch{ return DEFAULT_CFG; }};

/* ── EXPORT / IMPORT helpers ── */
const toCSV = rows => {
  const hdr = ['date','product','ca','pub','cogs','clics','cpc'];
  const esc = v => { const s=String(v??''); return /[",;\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
  const body = rows.map(r => hdr.map(k => esc(r[k])).join(',')).join('\n');
  return hdr.join(',') + '\n' + body;
};
const download = (name, content, type='text/plain') => {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
};
const parseCSV = text => {
  const lines = text.trim().split(/\r?\n/);
  if(lines.length<2) return [];
  const hdr = lines[0].split(',').map(s=>s.trim().toLowerCase());
  return lines.slice(1).map(line => {
    const cols = []; let cur=''; let q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(q){ if(c==='"'&&line[i+1]==='"'){cur+='"';i++;} else if(c==='"'){q=false;} else cur+=c; }
      else { if(c==='"')q=true; else if(c===','){cols.push(cur);cur='';} else cur+=c; }
    }
    cols.push(cur);
    const o = {}; hdr.forEach((h,i)=>o[h]=cols[i]);
    return o;
  });
};

const mkCalc = cfg => e => {
  const ca=+e.ca||0, pub=+e.pub||0, cogs=+e.cogs||0, cpc=+e.cpc||0, clics=+e.clics||0, ventes=+e.ventes||0;
  const notes = e.notes || '';
  const feesAmt=ca*((cfg.fees||0)/100);
  const otherVarAmt=ca*((cfg.otherFees||0)/100);
  const taxAmt=ca*((cfg.taxes||0)/100);
  const grossProfit=ca-pub-cogs-feesAmt-otherVarAmt;
  const profit=grossProfit-taxAmt;
  const roas=pub>0?ca/pub:0;
  const grossMarginPct=ca>0?(grossProfit/ca)*100:0;
  const netMarginPct=ca>0?(profit/ca)*100:0;
  const aov = ventes>0 ? ca/ventes : 0;
  const cpa = ventes>0 ? pub/ventes : 0;
  const convRate = clics>0 && ventes>0 ? (ventes/clics)*100 : 0;
  return {...e,ca,pub,cogs,cpc,clics,ventes,notes,feesAmt,otherVarAmt,taxAmt,grossProfit,profit,roas,grossMarginPct,netMarginPct,aov,cpa,convRate};
};

/* ── Sparkline component ── */
const Sparkline = ({values, color='#10b981', h=22, w=80}) => {
  if(!values || values.length<2) return null;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max-min || 1;
  const pts = values.map((v,i)=>{
    const x = (i/(values.length-1))*w;
    const y = h - ((v-min)/range)*h;
    return `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last = values[values.length-1];
  const lx = w, ly = h - ((last-min)/range)*h;
  return (
    <svg className="spark" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={pts} fill="none" stroke={color} strokeWidth="1.6" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={lx} cy={ly} r="2" fill={color}/>
    </svg>
  );
};

const I = ({d, size=16, color='currentColor', sw=1.8, children}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
    style={{display:'block',flexShrink:0}}>
    {children || <path d={d}/>}
  </svg>
);
const IcoUp   = () => <I sw={2.2}><path d="M22 7 13.5 15.5 8.5 10.5 2 17"/><path d="M16 7h6v6"/></I>;
const IcSave  = ({c='currentColor'}) => <I color={c} sw={2}><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></I>;
const IcCheck = () => <I color="var(--em)"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></I>;
const IcAlert = () => <I color="var(--rd)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></I>;
const IcInfo  = ({sz=10}) => <I size={sz}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></I>;
const IcTrash = () => <I size={12}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></I>;
const IcCog   = ({sz=12}) => <I size={sz}><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></I>;
const IcGrid  = ({sz=12}) => <I size={sz}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></I>;

/* ── NUMBER TICKER ── */
const NumCount = ({ value, isEur = false, isMult = false }) => {
  const [disp, setDisp] = useState(0);
  const prevVal = React.useRef(0);
  useEffect(() => {
    let start = null;
    const dur = 800; 
    const init = prevVal.current;
    
    const step = (t) => {
      if (!start) start = t;
      const p = Math.min((t - start) / dur, 1);
      const ease = 1 - Math.pow(1 - p, 4); // easeOutQuart
      setDisp(init + (value - init) * ease);
      if (p < 1) requestAnimationFrame(step);
      else prevVal.current = value;
    };
    requestAnimationFrame(step);
  }, [value]);
  
  if (isEur) return fmtEUR(disp);
  if (isMult) return fmtN(disp, 2) + '×';
  return fmtN(disp, 0);
};

/* ── Toast ── */
function Toast({msg, ok, onClose, actionLabel, onAction}) {
  useEffect(()=>{ const t=setTimeout(onClose,actionLabel?5000:3200); return ()=>clearTimeout(t); },[]);
  return (
    <div className={`toast ${ok?'tok':'terr'}`}>
      {ok ? <IcCheck/> : <IcAlert/>}
      {msg}
      {actionLabel && <button className="toast-act" onClick={()=>{onAction&&onAction();onClose();}}>{actionLabel}</button>}
    </div>
  );
}

/* ══════════════════════════════
   PURE SVG CHARTS (no dep)
══════════════════════════════ */

/* Area chart \u2014 CA Brut + Profit Net */
function movingAvg(arr, window=7){
  // O(n) sliding sum au lieu de O(n²) slice+reduce
  const out = []; let sum = 0;
  for(let i=0;i<arr.length;i++){
    sum += arr[i];
    if(i>=window) sum -= arr[i-window];
    out.push(sum / Math.min(i+1, window));
  }
  return out;
}
function AreaChart({data, h=280, showMA=false}) {
  if (!data.length) return null;
  const { useRef, useState: uSt } = React;
  const [tip, setTip] = uSt(null);
  const wrapRef = useRef(null);

  const W=1000, H=h;
  const vals1 = data.map(d=>d.ca);
  const vals2 = data.map(d=>d.profit);
  // reduce évite stack overflow sur grands tableaux (spread limite ~10k args)
  let min = 0, max = 1;
  for(let i=0;i<data.length;i++){
    if(data[i].ca<min) min=data[i].ca;
    if(data[i].ca>max) max=data[i].ca;
    if(data[i].profit<min) min=data[i].profit;
    if(data[i].profit>max) max=data[i].profit;
  }
  const range = max - min || 1;
  const pad = {t:16, r:20, b:44, l:62};
  const iw = W - pad.l - pad.r;
  const ih = H - pad.t - pad.b;
  const n = data.length;

  const px = i => pad.l + (n===1 ? iw/2 : i/(n-1)*iw);
  const py = v => pad.t + ih - ((v-min)/range)*ih;
  const mkPath = (vals) => vals.map((v,i)=>`${i===0?'M':'L'}${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  const mkArea = (vals, floor) => {
    const last = n-1;
    return mkPath(vals) + ` L${px(last).toFixed(1)},${py(floor).toFixed(1)} L${px(0).toFixed(1)},${py(floor).toFixed(1)} Z`;
  };
  const ticks = 4;
  const yTicks = Array.from({length:ticks+1},(_,i)=>min+(i/ticks)*range);
  const step = Math.max(1, Math.ceil(n/8));
  const xIdx = data.map((_,i)=>i).filter(i=>i%step===0||i===n-1);

  const onMove = e => {
    if(!wrapRef.current) return;
    const rect = wrapRef.current.getBoundingClientRect();
    const relX = e.clientX - rect.left;
    const svgX = relX / rect.width * W;
    const idx = Math.min(n-1, Math.max(0, Math.round((svgX - pad.l) / iw * (n-1))));
    setTip({ x: relX, y: e.clientY - rect.top, idx });
  };

  const TipBox = () => {
    if (tip===null) return null;
    const d = data[tip.idx];
    const wrapW = wrapRef.current?.offsetWidth || 600;
    const wrapH = wrapRef.current?.offsetHeight || 300;
    const TBW = 170, TBH = 90;
    const flipX = tip.x + 18 + TBW > wrapW;
    const flipY = tip.y + 18 + TBH > wrapH;
    const left = flipX ? Math.max(4, tip.x - TBW - 18) : tip.x + 18;
    const top  = flipY ? Math.max(4, tip.y - TBH - 14) : tip.y + 14;
    return (
      <div className="tip-box" style={{position:'absolute',left,top,background:'rgba(18,18,20,.94)',border:'1px solid rgba(255,255,255,0.12)',
        borderRadius:14,padding:'12px 14px',fontSize:12,pointerEvents:'none',zIndex:50,
        backdropFilter:'blur(12px)',boxShadow:'0 15px 35px rgba(0,0,0,.6)',minWidth:160}}>
        <div style={{fontWeight:700,marginBottom:8,color:'#e4e4e7',fontSize:12}}>{dfmt(d.date)}</div>
        <div style={{display:'flex',justifyContent:'space-between',gap:20,marginBottom:4}}>
          <span style={{color:'#71717a'}}>CA Brut</span>
          <span style={{color:'#10b981',fontWeight:600}}>{fmtEUR(d.ca)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',gap:20}}>
          <span style={{color:'#71717a'}}>Profit Net</span>
          <span style={{color:d.profit>=0?'#10b981':'#f43f5e',fontWeight:600}}>{fmtEUR(d.profit)}</span>
        </div>
      </div>
    );
  };

  return (
    <div ref={wrapRef} style={{position:'relative',cursor:'crosshair'}}
      onMouseMove={onMove} onMouseLeave={()=>setTip(null)}>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:`${H}px`,overflow:'visible',display:'block'}}>

        <path d={mkArea(vals2, Math.max(min,0))} fill="url(#gPR)" className="fu fu2"/>

          <>
            <path d={mkPath(movingAvg(vals1,7))} fill="none" stroke="#10b981" strokeWidth="1.8" strokeDasharray="5,4" opacity="0.75" strokeLinejoin="round"/>

            <circle cx={px(i)} cy={py(d.profit)} r="4" fill="#818cf8" opacity={xIdx.includes(i)?1:0}/>
          </g>

        ))}

        {tip!==null && (()=>{
          const i=tip.idx, d=data[i];
          return (
            <g>
              <line x1={px(i)} y1={pad.t} x2={px(i)} y2={pad.t+ih} stroke="rgba(255,255,255,0.18)" strokeWidth="1.5" strokeDasharray="4,4"/>
              <circle cx={px(i)} cy={py(d.ca)} r="7" fill="#10b981" stroke="rgba(255,255,255,0.35)" strokeWidth="2.5"/>
              <circle cx={px(i)} cy={py(d.profit)} r="7" fill="#818cf8" stroke="rgba(255,255,255,0.35)" strokeWidth="2.5"/>
            </g>
          );
        })()}
      </svg>
      <TipBox/>
    </div>
  );
}

/* Bar + Line chart \u2014 ROAS bars + CPC line */
function BarLineChart({data, roasMin=2, h=280}) {
  if (!data.length) return null;
  const { useRef, useState: uSt } = React;
  const [tip, setTip] = uSt(null);
  const wrapRef = useRef(null);

  const W=1000, H=h;
  let roasMax = roasMin+1, cpcMax = 0.1;
  for(let i=0;i<data.length;i++){
    if(data[i].roas>roasMax) roasMax=data[i].roas;
    if(data[i].cpc>cpcMax) cpcMax=data[i].cpc;
  }
  const roasVals = data.map(d=>d.roas);
  const cpcVals  = data.map(d=>d.cpc);
  const pad = {t:16,r:72,b:44,l:48};
  const iw = W-pad.l-pad.r;
  const ih = H-pad.t-pad.b;
  const n = data.length;

  const bw = Math.min(iw/n*0.55, 28);
  const bx = i => pad.l + (n===1 ? iw/2 : i/(n-1)*iw);
  const ryL = v => pad.t + ih - (v/roasMax)*ih;
  const ryR = v => pad.t + ih - (v/cpcMax)*ih;
  const cpcPts = data.map((d,i)=>`${i===0?'M':'L'}${bx(i).toFixed(1)},${ryR(d.cpc).toFixed(1)}`).join(' ');

  const step = Math.max(1,Math.ceil(n/8));
  const xIdx = data.map((_,i)=>i).filter(i=>i%step===0||i===n-1);
  const rTicks = [0,1,2,3,4].filter(v=>v<=roasMax+.5);

  const onMove = e => {
    if(!wrapRef.current) return;
    const rect = wrapRef.current.getBoundingClientRect();
    const relX = e.clientX - rect.left;
    const svgX = relX / rect.width * W;
    const idx = Math.min(n-1, Math.max(0, Math.round((svgX - pad.l) / iw * (n-1))));
    setTip({ x: relX, y: e.clientY - rect.top, idx });
  };

  const TipBox = () => {
    if (tip===null) return null;
    const d = data[tip.idx];
    const wrapW = wrapRef.current?.offsetWidth || 600;
    const wrapH = wrapRef.current?.offsetHeight || 300;
    const roasColor = d.roas>=roasMin ? '#f97316' : '#f43f5e';
    const TBW = 180, TBH = 110;
    const flipX = tip.x + 18 + TBW > wrapW;
    const flipY = tip.y + 18 + TBH > wrapH;
    const left = flipX ? Math.max(4, tip.x - TBW - 18) : tip.x + 18;
    const top  = flipY ? Math.max(4, tip.y - TBH - 14) : tip.y + 14;
    return (
      <div className="tip-box" style={{position:'absolute',left,top,background:'rgba(18,18,20,.96)',border:'1px solid rgba(255,255,255,0.12)',
        borderRadius:14,padding:'12px 14px',fontSize:12,pointerEvents:'none',zIndex:50,
        backdropFilter:'blur(12px)',boxShadow:'0 15px 35px rgba(0,0,0,.6)',minWidth:160}}>
        <div style={{fontWeight:700,marginBottom:8,color:'#e4e4e7',fontSize:12}}>{dfmt(d.date)}</div>
        <div style={{display:'flex',justifyContent:'space-between',gap:20,marginBottom:4}}>
          <span style={{color:'#71717a'}}>ROAS</span>
          <span style={{color:roasColor,fontWeight:600}}>{fmtN(d.roas,2)}×</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',gap:20,marginBottom:4}}>
          <span style={{color:'#71717a'}}>Dép. Pub</span>
          <span style={{color:'#f97316',fontWeight:600}}>{fmtEUR(d.pub||0)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',gap:20}}>
          <span style={{color:'#71717a'}}>CPC</span>
          <span style={{color:'#3b82f6',fontWeight:600}}>{d.cpc?`${fmtN(d.cpc,2)} €`:'—'}</span>
        </div>
      </div>
    );
  };

  return (
    <div ref={wrapRef} style={{position:'relative',cursor:'crosshair'}}
      onMouseMove={onMove} onMouseLeave={()=>setTip(null)}>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:`${H}px`,overflow:'visible',display:'block'}}>
        {rTicks.map(v=>(
          <g key={v}>
            <line x1={pad.l} y1={ryL(v).toFixed(1)} x2={W-pad.r} y2={ryL(v).toFixed(1)} stroke="rgba(255,255,255,0.07)" strokeDasharray="6,6"/>
            <text x={pad.l-8} y={ryL(v)+4} textAnchor="end" fontSize="13" fill="#71717a" fontFamily="Inter,sans-serif">{v}×</text>
          </g>
        ))}
        <line x1={pad.l} y1={ryL(roasMin).toFixed(1)} x2={W-pad.r} y2={ryL(roasMin).toFixed(1)} stroke="rgba(16,185,129,.4)" strokeDasharray="8,5" strokeWidth="1.5"/>
        {data.map((d,i)=>{
          const x = bx(i)-bw/2;
          const bh = Math.max(ih*(d.roas/roasMax),1);
          const by = pad.t+ih-bh;
          const isHov = tip?.idx===i;
          const c = d.roas>=roasMin ? (isHov?'rgba(249,115,22,1)':'rgba(249,115,22,.8)') : (isHov?'rgba(244,63,94,.9)':'rgba(244,63,94,.65)');
          return <rect key={i} className="anim-bar" style={{animationDelay:`${i*0.03}s`}} x={x} y={by} width={bw} height={bh} fill={c} rx="3"/>;
        })}
        <path d={cpcPts} pathLength="1" className="anim-path" fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
        {data.map((d,i)=>(
          <circle key={i} cx={bx(i)} cy={ryR(d.cpc)} r={tip?.idx===i?6:3.5} fill="#3b82f6"
            stroke={tip?.idx===i?"rgba(255,255,255,0.35)":"none"} strokeWidth="2"
            opacity={xIdx.includes(i)||tip?.idx===i?1:0}/>
        ))}
        {[0, cpcMax/2, cpcMax].map((v,i)=>(
          <text key={i} x={W-pad.r+8} y={ryR(v)+4} textAnchor="start" fontSize="12" fill="#71717a" fontFamily="Inter,sans-serif">{v.toFixed(2)}€</text>
        ))}
        {xIdx.map(i=>(
          <text key={i} x={bx(i)} y={H-10} textAnchor="middle" fontSize="12" fill="#71717a" fontFamily="Inter,sans-serif">{dfmt(data[i].date)}</text>
        ))}
        {/* Hover hairline */}
        {tip!==null && (
          <line x1={bx(tip.idx)} y1={pad.t} x2={bx(tip.idx)} y2={pad.t+ih} stroke="rgba(255,255,255,0.15)" strokeWidth="1.5" strokeDasharray="4,4"/>
        )}
      </svg>
      <TipBox/>
    </div>
  );
}




/* ══ DATE RANGE PICKER ══ */
function DateRangePicker({start, end, onApply}) {
  const today = toDay();
  const initD = start ? new Date(start+'T00:00:00') : new Date();
  const [vy, setVy] = React.useState(initD.getFullYear());
  const [vm, setVm] = React.useState(initD.getMonth()); // 0-11
  const [s, setS] = React.useState(start || '');
  const [e, setE] = React.useState(end || '');
  const [picking, setPicking] = React.useState('start');
  const [hover, setHover] = React.useState('');

  const dim = new Date(vy, vm+1, 0).getDate();
  const firstWd = (new Date(vy, vm, 1).getDay() + 6) % 7; // Mon=0
  const mk = d => `${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  const click = ds => {
    if (picking === 'start') {
      setS(ds); setE(''); setPicking('end');
    } else {
      const [ns,ne] = ds < s ? [ds,s] : [s,ds];
      setS(ns); setE(ne); setPicking('start');
      onApply(ns, ne);
    }
  };

  const isSel = ds => ds===s || (picking==='start' && ds===e);
  const isHEnd = ds => picking==='end' && ds===hover && hover>=s;
  const inRng = ds => {
    const hi = picking==='end' ? (hover>s?hover:'') : e;
    return !!(s && hi && ds>s && ds<hi);
  };

  const prev = () => { if(vm===0){setVm(11);setVy(y=>y-1);}else{setVm(m=>m-1);} };
  const next = () => { if(vm===11){setVm(0);setVy(y=>y+1);}else{setVm(m=>m+1);} };
  const MN = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  const cells = [];
  for(let i=0;i<firstWd;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  return (
    <div className="cal-wrap">
      <div className="cal-head">
        <button className="cal-nav" onClick={prev}>‹</button>
        <span className="cal-month-lbl">{MN[vm]} {vy}</span>
        <button className="cal-nav" onClick={next}>›</button>
      </div>
      <div className="cal-grid">
        {['Lu','Ma','Me','Je','Ve','Sa','Di'].map(l=><div key={l} className="cal-dlbl">{l}</div>)}
        {cells.map((d,i) => {
          if(!d) return <div key={`e${i}`} className="cal-day cal-empty"/>;
          const ds = mk(d);
          const cls = ['cal-day',
            ds===today?'cal-today':'',
            isSel(ds)||isHEnd(ds)?'cal-sel':'',
            !isSel(ds)&&!isHEnd(ds)&&inRng(ds)?'cal-range':'',
          ].filter(Boolean).join(' ');
          return (
            <div key={ds} className={cls}
              onClick={()=>click(ds)}
              onMouseEnter={()=>setHover(ds)}
              onMouseLeave={()=>setHover('')}>{d}</div>
          );
        })}
      </div>
      <div className="cal-hint">
        {picking==='end'
          ? `Début: ${dfmt(s)} · cliquez la fin`
          : 'Cliquez sur la date de début'}
      </div>
      {s && e && picking==='start' && (
        <div className="cal-result">✓ {dfmt(s)} → {dfmt(e)}</div>
      )}
    </div>
  );
}

/* ══════════════ DatePicker ══════════════ */
function DatePicker({value, onChange}) {
  const [open, setOpen] = React.useState(false);
  const [vy, setVy] = React.useState(()=>{ const d=value?new Date(value+'T12:00:00'):new Date(); return d.getFullYear(); });
  const [vm, setVm] = React.useState(()=>{ const d=value?new Date(value+'T12:00:00'):new Date(); return d.getMonth(); });
  const ref = React.useRef(null);

  React.useEffect(()=>{
    if(value){ const d=new Date(value+'T12:00:00'); setVy(d.getFullYear()); setVm(d.getMonth()); }
  },[value]);

  React.useEffect(()=>{
    if(!open) return;
    const h = e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[open]);

  const todayStr = new Date().toISOString().slice(0,10);
  const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const JOURS = ['L','M','M','J','V','S','D'];

  const firstDow = (()=>{ let d=new Date(vy,vm,1).getDay(); return d===0?6:d-1; })();
  const daysInMonth = new Date(vy,vm+1,0).getDate();
  const cells = [...Array(firstDow).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];

  const prev = ()=>{ if(vm===0){setVm(11);setVy(y=>y-1);}else setVm(m=>m-1); };
  const next = ()=>{ if(vm===11){setVm(0);setVy(y=>y+1);}else setVm(m=>m+1); };
  const pick = d=>{ if(!d) return; onChange(`${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`); setOpen(false); };
  const goToday = ()=>{ const t=new Date(); setVy(t.getFullYear()); setVm(t.getMonth()); onChange(todayStr); setOpen(false); };

  const display = value ? new Date(value+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}) : 'Sélectionner…';

  const btnBase = {border:'none',background:'transparent',cursor:'pointer',fontFamily:'Inter,sans-serif',outline:'none'};

  return (
    <div ref={ref} style={{position:'relative',flex:1,minWidth:0}}>
      <button type="button" onClick={()=>setOpen(o=>!o)} style={{
        width:'100%',padding:'8px 12px',background:'var(--sf2)',border:`1px solid ${open?'var(--em)':'var(--bd2)'}`,
        borderRadius:8,color:value?'var(--tx)':'var(--tx3)',fontSize:13,fontFamily:'Inter,sans-serif',cursor:'pointer',
        display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,
        boxShadow:open?'0 0 0 3px var(--em2)':'none',transition:'all .15s'
      }}>
        <span>{display}</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>

      {open && (
        <div style={{
          position:'absolute',top:'calc(100% + 6px)',left:0,zIndex:1200,
          background:'#16161a',border:'1px solid rgba(255,255,255,.1)',borderRadius:16,
          padding:'16px',width:268,boxShadow:'0 24px 64px rgba(0,0,0,.8)',

        }}>

            <span style={{fontSize:13,fontWeight:700,color:'#f4f4f5',letterSpacing:'-.2px'}}>{MOIS[vm]} {vy}</span>
            <button type="button" style={navBtn} onClick={next}>›</button>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:4}}>
            {JOURS.map((j,i)=>(
              <div key={i} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'#52525b',padding:'3px 0',letterSpacing:'.5px'}}>{j}</div>
            ))}
          </div>

          {/* Days */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
            {cells.map((d,i)=>{
              if(!d) return <div key={i}/>;
              const ds=`${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
