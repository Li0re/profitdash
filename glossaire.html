<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glossaire · ProfitDash</title>
  <meta name="description" content="Glossaire de tous les termes e-commerce utilisés dans ProfitDash."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09090b;--sf:#18181b;--sf2:#27272a;--sf3:#3f3f46;
      --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.15);
      --tx:#fafafa;--tx2:#a1a1aa;--tx3:#52525b;
      --em:#10b981;--em2:rgba(16,185,129,0.14);
      --rd:#f43f5e;--rd2:rgba(244,63,94,0.13);
      --or:#f97316;--or2:rgba(249,115,22,0.13);
      --bl:#3b82f6;--bl2:rgba(59,130,246,0.13);
      --in:#818cf8;--in2:rgba(129,140,248,.14);
      --am:#f59e0b;--am2:rgba(245,158,11,0.13);
      --r:20px;--rl:28px;
    }
    html,body{min-height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:4px}

    @keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fu .4s ease both}
    .fu1{animation-delay:.05s}.fu2{animation-delay:.10s}.fu3{animation-delay:.16s}

    /* NAV */
    .nav{position:fixed;top:0;left:0;right:0;z-index:900;height:60px;
      background:rgba(9,9,11,0.65);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
      border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 26px;
      box-shadow:0 4px 30px rgba(0,0,0,0.1)}
    .brand{display:flex;align-items:center;gap:10px}
    .bn{font-size:15px;font-weight:700;letter-spacing:-.3px}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .shimmer-text{background:linear-gradient(90deg,#fff 0%,#10b981 50%,#fff 100%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite}
    .bs{font-size:11px;color:var(--tx3)}
    .nav-r{display:flex;align-items:center;gap:7px}
    .chip{padding:4px 11px;border-radius:20px;border:1px solid var(--bd2);background:var(--sf);font-size:11px;color:var(--tx2)}
    .chip-g{border-color:rgba(16,185,129,.4);background:var(--em2);color:var(--em)}
    .nlink{padding:6px 12px;border-radius:8px;border:1px solid var(--bd2);background:var(--sf2);
      color:var(--tx2);font-size:11px;font-weight:500;text-decoration:none;
      display:inline-flex;align-items:center;gap:5px;transition:all .15s}
    .nlink:hover{border-color:var(--tx2);color:var(--tx);background:var(--sf3)}
    .nlink.act{background:var(--em2);border-color:var(--em);color:var(--em)}

    /* SHELL */
    .shell{padding-top:60px}
    .main{padding:32px 24px 80px;max-width:1100px;margin:0 auto}

    /* HEADER */
    .pht{font-size:26px;font-weight:800;letter-spacing:-.5px;
      background:linear-gradient(120deg,#fff 30%,#52525b 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .phs{font-size:12px;color:var(--tx3);margin-top:4px}

    /* SEARCH */
    .search-wrap{position:relative;margin:22px 0 28px}
    .search-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none}
    .search-input{
      width:100%;padding:11px 16px 11px 40px;
      background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);
      color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;outline:none;
      transition:border-color .15s,box-shadow .15s;
    }
    .search-input:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--em2)}
    .search-input::placeholder{color:var(--tx3)}

    /* CATEGORY FILTERS */
    .filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px}
    .fbtn{padding:5px 13px;border-radius:20px;border:1px solid var(--bd2);background:var(--sf2);
      color:var(--tx2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
    .fbtn:hover{border-color:var(--tx2);color:var(--tx)}
    .fbtn.on{background:var(--em2);border-color:var(--em);color:var(--em)}

    /* GRID */
    .gloss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
    .gi{
      background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rl);
      padding:18px 20px;transition:border-color .15s,transform .15s;
      display:flex;flex-direction:column;gap:8px;
    }
    .gi:hover{border-color:var(--tx3);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
    .gi-head{display:flex;align-items:center;gap:9px}
    .gi-badge{padding:3px 10px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
    .gi-name{font-size:13px;font-weight:700;color:var(--tx)}
    .gi-cat{font-size:10px;color:var(--tx3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;
      background:var(--sf2);padding:2px 7px;border-radius:5px;margin-left:auto;flex-shrink:0}
    .gi-formula{
      font-family:'Courier New',monospace;font-size:11px;
      background:var(--sf2);border:1px solid var(--bd);border-radius:7px;
      padding:6px 10px;color:var(--em);
    }
    .gi-def{font-size:12px;color:var(--tx2);line-height:1.65}
    .gi-tip{
      font-size:11px;margin-top:2px;
      border-radius:7px;padding:7px 10px;
      display:flex;align-items:flex-start;gap:5px;line-height:1.5;
    }
    .tip-warn{background:var(--am2);color:var(--am)}
    .tip-info{background:var(--em2);color:var(--em)}
    .tip-danger{background:var(--rd2);color:var(--rd)}

    /* Empty state */
    .empty-search{display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:60px 20px;gap:10px;text-align:center;color:var(--tx3);font-size:13px}

    /* Count badge */
    .count{font-size:12px;color:var(--tx3);margin-bottom:14px}
    .count span{color:var(--em);font-weight:600}
  </style>
</head>
<body>

<nav class="nav">
  <div class="brand">
    <div><div class="bn shimmer-text">ProfitDash</div><div class="bs">E-Commerce · High-Ticket</div></div>
  </div>
  <div class="nav-r">
    <a href="index.html" class="nlink">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="glossaire.html" class="nlink act">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      Glossaire
    </a>
    <a href="settings.html" class="nlink">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      Paramètres
    </a>
    <span class="chip" id="nav-count">… entrées</span>
    <span class="chip chip-g" id="nav-date"></span>
  </div>
</nav>

<div class="shell">
  <div class="main">

    <div class="fu">
      <h1 class="pht">Glossaire E-Commerce</h1>
      <p class="phs">Tous les termes utilisés dans ProfitDash · Cliquez sur une catégorie pour filtrer</p>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap fu fu1">
      <div class="search-ic">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <input class="search-input" id="search" type="text" placeholder="Rechercher un terme : ROAS, CPC, COGS…" oninput="filterCards()"/>
    </div>

    <!-- FILTERS -->
    <div class="filters fu fu1" id="filters">
      <button class="fbtn on" data-cat="all" onclick="setFilter('all',this)">Tous</button>
      <button class="fbtn" data-cat="revenus" onclick="setFilter('revenus',this)">Revenus</button>
      <button class="fbtn" data-cat="couts" onclick="setFilter('couts',this)">Coûts</button>
      <button class="fbtn" data-cat="pub" onclick="setFilter('pub',this)">Publicité</button>
      <button class="fbtn" data-cat="perf" onclick="setFilter('perf',this)">Performance</button>
      <button class="fbtn" data-cat="client" onclick="setFilter('client',this)">Client</button>
    </div>

    <div class="count fu fu2" id="count-lbl"></div>

    <!-- GRID -->
    <div class="gloss-grid fu fu2" id="grid"></div>
    <div class="empty-search" id="empty" style="display:none">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Aucun terme ne correspond à votre recherche.
    </div>

  </div>
</div>

<script>
const TERMS = [
  {
    code:'CA', name:"Chiffre d'Affaires", cat:'revenus',
    badge:{bg:'var(--em2)',color:'var(--em)'},
    formula: null,
    def:"Montant total encaissé via Stripe ou PayPal avant toute déduction. C'est le revenu brut généré par vos ventes sur la période.",
    tip:{type:'info', text:"N'inclut PAS les remboursements. Déduisez les refunds manuellement."}
  },
  {
    code:'NET', name:'Profit Net', cat:'revenus',
    badge:{bg:'var(--em2)',color:'var(--em)'},
    formula:'Profit = CA − Pub − COGS − Frais Transaction',
    def:"Le cash réellement dans votre poche après toutes les dépenses directes. C'est votre KPI de rentabilité #1.",
    tip:{type:'warn', text:"Ne tient pas compte des charges fixes (SaaS, employés…). Intégrez vos charges mensuelles pour une vision complète."}
  },
  {
    code:'MARGE', name:'Marge Brute', cat:'revenus',
    badge:{bg:'var(--em2)',color:'var(--em)'},
    formula:'Marge Brute = CA − COGS',
    def:"Revenu restant après soustraction du seul coût des marchandises. Elle n'inclut pas les dépenses pub ni les frais de transaction.",
    tip:null
  },
  {
    code:'COGS', name:'Coût des Marchandises', cat:'couts',
    badge:{bg:'var(--or2)',color:'var(--or)'},
    formula:null,
    def:"Cost Of Goods Sold — Coût d'achat chez votre fournisseur (produit + shipping fournisseur) pour les unités vendues ce jour.",
    tip:{type:'info', text:"Dropshipping : prix payé au fournisseur × nombre de commandes du jour."}
  },
  {
    code:'FEES', name:'Frais de Transaction', cat:'couts',
    badge:{bg:'var(--rd2)',color:'var(--rd)'},
    formula:'Frais = CA × taux% (défaut 3%)',
    def:"Commission prélevée par Stripe (2.9% + 0.30€/transaction) ou PayPal. Simplifiée à un taux fixe configurable dans les Paramètres.",
    tip:null
  },
  {
    code:'PUB', name:'Dépenses Publicitaires', cat:'pub',
    badge:{bg:'var(--rd2)',color:'var(--rd)'},
    formula:null,
    def:"Budget total dépensé sur vos plateformes publicitaires (Google Ads, Meta Ads, TikTok Ads…) pour générer du trafic sur la période.",
    tip:{type:'info', text:"Inclure uniquement les dépenses campagnes, pas les abonnements outils."}
  },
  {
    code:'ROAS', name:'Return On Ad Spend', cat:'pub',
    badge:{bg:'var(--or2)',color:'var(--or)'},
    formula:'ROAS = CA ÷ Dépenses Pub',
    def:"Retour sur investissement publicitaire. ROAS 3× → chaque €1 dépensé en pub génère 3€ de CA.",
    tip:{type:'info', text:"Pour être rentable en High-Ticket, visez ROAS ≥ 2-3×. En dessous de 1×, vous perdez de l'argent."}
  },
  {
    code:'CPC', name:'Coût Par Clic', cat:'pub',
    badge:{bg:'var(--bl2)',color:'var(--bl)'},
    formula:'CPC = Budget Pub ÷ Nb de Clics',
    def:"Prix moyen payé pour chaque clic sur vos annonces. Un CPC qui monte sans amélioration du ROAS est un signal d'alarme.",
    tip:{type:'warn', text:"Surveillez la corrélation CPC ↑ + ROAS ↓ sur le graphique Performance Pub."}
  },
  {
    code:'CTR', name:'Taux de Clic', cat:'pub',
    badge:{bg:'var(--bl2)',color:'var(--bl)'},
    formula:'CTR = (Clics ÷ Impressions) × 100',
    def:"Pourcentage de personnes qui cliquent sur votre annonce après l'avoir vue. Non tracké dans ce dashboard (à venir).",
    tip:null
  },
  {
    code:'CVR', name:'Taux de Conversion', cat:'perf',
    badge:{bg:'var(--in2)',color:'var(--in)'},
    formula:'CVR = (Ventes ÷ Clics) × 100',
    def:"Pourcentage de visiteurs qui passent commande. Un CVR élevé avec un CPC élevé peut quand même être rentable.",
    tip:{type:'info', text:"En High-Ticket, un CVR de 1-3% est normal. L'objectif : maximiser la valeur du panier."}
  },
  {
    code:'AOV', name:'Valeur Panier Moyen', cat:'perf',
    badge:{bg:'var(--am2)',color:'var(--am)'},
    formula:'AOV = CA Total ÷ Nb de Commandes',
    def:"Average Order Value — Valeur moyenne de chaque commande. Augmenter l'AOV est la façon la plus rapide d'améliorer votre ROAS.",
    tip:null
  },
  {
    code:'LTV', name:'Valeur Vie Client', cat:'client',
    badge:{bg:'var(--em2)',color:'var(--em)'},
    formula:'LTV ≈ AOV × Fréquence × Durée relation',
    def:"Lifetime Value — Revenu total généré par un client sur toute sa relation avec vous. Crucial pour les offres récurrentes.",
    tip:{type:'info', text:"LTV élevée → vous pouvez vous permettre un ROAS bas en acquisition."}
  },
  {
    code:'CAC', name:"Coût d'Acquisition Client", cat:'client',
    badge:{bg:'var(--rd2)',color:'var(--rd)'},
    formula:'CAC = Pub ÷ Nb de Nouveaux Clients',
    def:"Combien vous coûte l'acquisition d'un nouveau client. Votre CAC doit toujours être inférieur à votre LTV pour un business viable.",
    tip:{type:'danger', text:"CAC > LTV = business model non viable à long terme."}
  },
  {
    code:'BREAK', name:'Point Mort / Break-Even', cat:'revenus',
    badge:{bg:'var(--am2)',color:'var(--am)'},
    formula:'Break-even ROAS = 1 ÷ Taux de Marge',
    def:"Le CA minimum nécessaire pour couvrir toutes vos dépenses (Pub + COGS + Frais). En dessous, vous perdez de l'argent.",
    tip:{type:'warn', text:"Si votre marge brute est 40%, votre break-even ROAS est 1 ÷ 0.40 = 2.5×."}
  },
  {
    code:'ROI', name:'Return On Investment', cat:'perf',
    badge:{bg:'var(--in2)',color:'var(--in)'},
    formula:'ROI = (Profit Net ÷ Investissement) × 100',
    def:"Mesure le gain relatif par rapport au total investi (Pub + COGS). Plus large que le ROAS, il inclut tous les coûts.",
    tip:null
  },
  {
    code:'CPM', name:'Coût Pour 1000 Impressions', cat:'pub',
    badge:{bg:'var(--bl2)',color:'var(--bl)'},
    formula:'CPM = (Budget Pub ÷ Impressions) × 1000',
    def:"Tarification des publicités au volume d'affichage. Un CPM qui monte signifie que l'audience devient plus compétitive.",
    tip:{type:'info', text:"Meta Ads et TikTok Ads facturent souvent au CPM. Google Search facture au CPC."}
  },
];

let activeFilter = 'all';
let searchQuery = '';

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid();
}

function filterCards() {
  searchQuery = document.getElementById('search').value.toLowerCase().trim();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const countEl = document.getElementById('count-lbl');

  const visible = TERMS.filter(t => {
    const matchCat = activeFilter === 'all' || t.cat === activeFilter;
    const matchQ = !searchQuery ||
      t.code.toLowerCase().includes(searchQuery) ||
      t.name.toLowerCase().includes(searchQuery) ||
      t.def.toLowerCase().includes(searchQuery);
    return matchCat && matchQ;
  });

  countEl.innerHTML = `<span>${visible.length}</span> terme${visible.length !== 1 ? 's' : ''} affiché${visible.length !== 1 ? 's' : ''}`;

  if (!visible.length) {
    grid.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = visible.map(t => `
    <div class="gi">
      <div class="gi-head">
        <span class="gi-badge" style="background:${t.badge.bg};color:${t.badge.color}">${t.code}</span>
        <span class="gi-name">${t.name}</span>
        <span class="gi-cat">${catLabel(t.cat)}</span>
      </div>
      ${t.formula ? `<div class="gi-formula">${t.formula}</div>` : ''}
      <div class="gi-def">${t.def}</div>
      ${t.tip ? `<div class="gi-tip tip-${t.tip.type}">${t.tip.text}</div>` : ''}
    </div>
  `).join('');
}

function catLabel(c) {
  return {revenus:'Revenus',couts:'Coûts',pub:'Publicité',perf:'Performance',client:'Client'}[c] || c;
}

// Nav chips
(function(){
  const SK = 'profitdash_v1';
  const rows = JSON.parse(localStorage.getItem(SK) || '[]');
  const n = rows.length;
  document.getElementById('nav-count').textContent = n + ' entrée' + (n !== 1 ? 's' : '');
  const d = new Date();
  document.getElementById('nav-date').textContent = d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
})();

renderGrid();
</script>
</body>
</html>
